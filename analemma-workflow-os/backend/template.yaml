AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless workflow backend with security hardening and scalable architecture.
  # Trigger deployment retry - IAM and Monitoring update v8
  Features: IDOR vulnerability fixes, JWT-based authentication, sharded DynamoDB GSI
  for improved scalability, and proper tenant data isolation.
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E6101  # Ignore FunctionUrl property recognition error
        - E1010  # Ignore incorrect GetAtt parsing
        - W1001  # Ignore conditional resource reference warning

Parameters:
  StageName:
    Type: String
    Default: dev
    Description: Deployment stage name (e.g., dev, prod).
  MockMode:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable mock mode for LLM responses (true/false).
  CognitoIssuerUrl:
    Type: String
    Description: The issuer URL for the Cognito User Pool.
  CognitoAudience:
    Type: String
    Description: The App Client ID (audience) for the Cognito User Pool.
  AllowedOrigins:
    Type: String
    Default: "https://d22tnxagg6c5pz.cloudfront.net,http://localhost:3000,http://localhost:5173"
    Description: Comma-separated list of allowed CORS origins. Include all frontend URLs (CloudFront, localhost for dev).
  OpenAiApiKey:
    Type: String
    Description: API key for OpenAI access.
    NoEcho: true
  AnthropicApiKey:
    Type: String
    Description: API key for Anthropic access.
    NoEcho: true
  GoogleApiKey:
    Type: String
    Description: API key for Google Gemini access.
    NoEcho: true
  GcpProjectId:
    Type: String
    Default: ""
    Description: GCP Project ID for Vertex AI Gemini integration.
  GcpLocation:
    Type: String
    Default: "us-central1"
    Description: GCP Location for Vertex AI (e.g., us-central1, asia-northeast3).
  # GcpServiceAccountKey is stored directly by GitHub Actions in AWS Secrets Manager
  # (avoids JSON escaping issues with SAM parameter-overrides)
  WorkflowStateBucket:
    Type: String
    Default: ""
    Description: S3 bucket name for workflow intermediate state offload. If empty, auto-created.
  CallbackWhitelist:
    Type: String
    Default: ""
    Description: Optional comma-separated list of allowed callback URL hostnames.
  # Fargate Async Worker
  AsyncWorkerEcsCluster:
    Type: String
    Default: ""
  AsyncWorkerTaskDefinition:
    Type: String
    Default: ""
  AsyncWorkerExecutionRoleArn:
    Type: String
    Default: ""
    Description: ARN of the execution role used by the Async Worker ECS Task Definition.
  AsyncWorkerSubnetIds:
    Type: String
    Default: ""
  AsyncWorkerSecurityGroupIds:
    Type: String
    Default: ""
  
  # [Test User Authentication] - GitHub Secrets → AWS Secrets Manager
  TestUserEmail:
    Type: String
    Default: ""
    Description: Test user email for simulator auth tests (from GitHub Secrets)
  TestUserPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Test user password for simulator auth tests (from GitHub Secrets)

  # [Addition] Kinesis ARN to be injected from external (default is empty string)
  ExternalExecutionsStreamArn:
    Type: String
    Default: ""
    Description: ARN of a pre-existing Kinesis stream. If provided, creation is skipped.

  # [E2E IoT Core MQTT] Enable IoT Core pub/sub for hybrid testing
  E2EIoTEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable IoT Core MQTT for E2E hybrid testing

  # [E2E IoT Core MQTT] IoT Core Data-ATS endpoint
  E2EIoTEndpoint:
    Type: String
    Default: ""
    Description: IoT Core Data-ATS endpoint (from aws iot describe-endpoint --endpoint-type iot:Data-ATS)

  # [Addition] Inject image URI built externally
  BackendLambdaImageUri:
    Type: String
    Description: Docker Image URI for Backend Lambda Functions

  # Parameters related to DB update strategy
  DbUpdateStrategy:
    Type: String
    Default: "SELECTIVE"
    AllowedValues: ["ALL", "SELECTIVE", "MINIMAL"]
    Description: Database update strategy (ALL=every update, SELECTIVE=smart updates, MINIMAL=critical only)
  
  DbUpdateInterval:
    Type: Number
    Default: 30
    MinValue: 10
    MaxValue: 300
    Description: Minimum interval between database updates in seconds (for SELECTIVE strategy)

Globals:
  Function:
    Architectures:
      - arm64  # Graviton2: 20% cost savings, better performance for Python workloads
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        # Common environment variables
        WORKFLOWS_TABLE: !Ref WorkflowsTableV3
        TASK_TOKENS_TABLE_NAME: !Ref TaskTokensTableV3
        IDEMPOTENCY_TABLE: !Ref IdempotencyTableV3
        USERS_TABLE: !Ref UsersTableV3
        GOVERNANCE_AUDIT_LOG_TABLE: !Ref GovernanceAuditLogV3  # [v2.1] Agent Governance
        WORKFLOWS_OWNER_INDEX: OwnerIdNameIndex
        CLOUDFRONT_DOMAIN: !Ref AllowedOrigins
        WORKFLOW_ORCHESTRATOR_ARN: !Sub
          - "arn:aws:states:${AWS::Region}:${AccountId}:stateMachine:WorkflowOrchestrator-${StageName}"
          - AccountId: !Ref "AWS::AccountId"
        WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !Sub
          - "arn:aws:states:${AWS::Region}:${AccountId}:stateMachine:WorkflowDistributedOrchestrator-${StageName}"
          - AccountId: !Ref "AWS::AccountId"
        MOCK_MODE: !Ref MockMode
        GCP_PROJECT_ID: !Ref GcpProjectId
        GCP_LOCATION: !Ref GcpLocation
        # GCP_SERVICE_ACCOUNT_KEY is stored in Secrets Manager (separate secret), not as env var
        VERTEX_SECRET_NAME: !Sub "backend-workflow-${StageName}-vertex_ai_config"
        GCP_SA_SECRET_NAME: !Sub "backend-workflow-${StageName}-gcp_service_account"
        SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # OWNER_INDEX removed from Globals - each function must specify correct index for its table
        # WorkflowsTableV3 uses: OwnerIdNameIndex
        # ExecutionsTableV3 uses: OwnerIdStartDateIndex
        BEDROCK_JOB_TABLE: !Ref BedrockJobTableV3
        # [Checkpoint & Time Machine common variables]
        CHECKPOINT_TABLE: !Ref CheckpointsTableV3
        
        # ✅ Phase D: Smart StateBag Feature Flags (환경 변수 기반)
        # 🚩 피드백 ③ Safe Fallback: 기본값 false (안전성 우선)
        USE_BATCHING: "false"        # Phase 8: BatchedDehydrator 사용 (Hot/Warm/Cold 배치)
        USE_ZSTD: "false"            # Phase 8: Zstd 압축 (68% vs 60% Gzip)
        ZSTD_LEVEL: "3"              # Zstd 압축 레벨 (1-22, 기본 3)
        USE_2PC: "false"             # Phase 10: 2-Phase Commit (99.99% 정합성)
        GC_DLQ_URL: !GetAtt GCDeadLetterQueue.QueueUrl  # Phase 10: GC DLQ URL

Conditions:
  CreateWorkflowStateBucket: !Equals [ !Ref WorkflowStateBucket, "" ]
  HasAsyncWorkerExecutionRole: !Not [ !Equals [ !Ref AsyncWorkerExecutionRoleArn, "" ] ]
  CreateAsyncWorkerRole: !Equals [ !Ref AsyncWorkerExecutionRoleArn, "" ]
  HasAsyncWorkerTaskDefinition: !Not [ !Equals [ !Ref AsyncWorkerTaskDefinition, "" ] ]
  # [Addition] Condition to create resource only when ARN is empty
  ShouldCreateKinesisStream: !Equals [ !Ref ExternalExecutionsStreamArn, "" ]
  # [Addition] Create secret only when test user credentials are provided
  HasTestUserCredentials: !And
    - !Not [ !Equals [ !Ref TestUserEmail, "" ] ]
    - !Not [ !Equals [ !Ref TestUserPassword, "" ] ]
  # [Addition] Create GCP secret only when GCP credentials are provided
  HasGcpCredentials: !Not [ !Equals [ !Ref GcpProjectId, "" ] ]
  # Note: GcpServiceAccountKey secret is created by GitHub Actions directly in Secrets Manager
  # [E2E] Enable IoT Core MQTT resources for hybrid testing
  E2EEnabled: !Equals [ !Ref E2EIoTEnabled, "true" ]

Resources:
  # [Secondary optimization] CheckIdempotencyFunction removed
  # Replaced with Direct SDK Integration (Direct DynamoDB query from Step Functions)
  # 100-300ms savings by removing Lambda Cold Start

  # --- Layers (Lightweight Only) ---
  # 🚨 LAYER SIZE LIMIT: 262MB unzipped
  # Heavy dependencies (AI libs, FastAPI, etc.) moved to Docker images
  
  CommonDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "backend-common-deps-${StageName}"
      ContentUri: packages/lambda-layers/common
      CompatibleRuntimes: [python3.12]
    Metadata:
      BuildMethod: python3.12

  # ❌ REMOVED: Heavy layers that exceed 262MB limit
  # - LLMDependenciesLayer (moved to Docker image)
  # - LLMCoreDependenciesLayer (moved to Docker image) 
  # - GoogleGenerativeAILayer (moved to Docker image)
  # - HeavyDependenciesLayer (moved to Docker image)
  
  # All AI/ML dependencies now included in Docker images for PackageType: Image functions

  # --- Secrets ---
  OpenAISecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "backend-workflow-${StageName}-openai_api_key"
      SecretString: !Sub '{"api_key":"${OpenAiApiKey}"}'

  GeminiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "backend-workflow-${StageName}-gemini_api_key"
      SecretString: !Sub '{"api_key":"${GoogleApiKey}"}'

  AnthropicSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "backend-workflow-${StageName}-anthropic_api_key"
      SecretString: !Sub '{"api_key":"${AnthropicApiKey}"}'

  # 🔐 Test user authentication information (for simulator)
  # GitHub Secrets → Save to AWS Secrets Manager during deployment → Runtime lookup from Lambda
  TestUserCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasTestUserCredentials
    Properties:
      Name: !Sub "analemma/${StageName}/test-user-credentials"
      SecretString: !Sub '{"email":"${TestUserEmail}","password":"${TestUserPassword}"}'
      Description: "Test user credentials for simulator auth tests"

  # 🔐 GCP Vertex AI credentials for Gemini integration
  # GitHub Secrets → Save to AWS Secrets Manager during deployment → Runtime lookup from Lambda
  # Note: GcpServiceAccountKey should be a JSON string (escaped) or empty string
  GcpVertexAiSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasGcpCredentials
    Properties:
      Name: !Sub "backend-workflow-${StageName}-vertex_ai_config"
      SecretString: !Sub '{"project_id":"${GcpProjectId}","location":"${GcpLocation}"}'
      Description: "GCP Vertex AI configuration for Gemini integration"

  # Note: GCP Service Account Key secret (backend-workflow-${StageName}-gcp_service_account) is created
  # directly by GitHub Actions in AWS Secrets Manager to avoid JSON escaping issues

  # 🔐 SSM Parameter for Cognito User Pool ID
  # Extract and store User Pool ID from CognitoIssuerUrl (used by LocalRunnerFunction, etc.)
  CognitoUserPoolIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/analemma/${StageName}/cognito-user-pool-id"
      Type: String
      # CognitoIssuerUrl format: https://cognito-idp.{region}.amazonaws.com/{poolId}
      Value: !Select [3, !Split ["/", !Ref CognitoIssuerUrl]]
      Description: !Sub "Cognito User Pool ID for ${StageName} environment"

  # PricingConfigParameter removed due to missing Properties causing build error

  # 🔧 SSM Parameter for Pricing Configuration
  # Required by UsageAggregatorFunction for cost calculation and user usage tracking
  PricingConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/analemma/${StageName}/pricing"
      Type: String
      Value: !Sub |
        {
          "openai": {
            "gpt-4": {"input": 0.03, "output": 0.06},
            "gpt-4-turbo": {"input": 0.01, "output": 0.03},
            "gpt-3.5-turbo": {"input": 0.0015, "output": 0.002}
          },
          "anthropic": {
            "claude-3-opus": {"input": 0.015, "output": 0.075},
            "claude-3-sonnet": {"input": 0.003, "output": 0.015},
            "claude-3-haiku": {"input": 0.00025, "output": 0.00125}
          },
          "google": {
            "gemini-pro": {"input": 0.00025, "output": 0.0005}
          },
          "tokens_per_thousand": 1000,
          "currency": "USD",
          "last_updated": "${AWS::StackName}-${StageName}"
        }
      Description: !Sub "Pricing configuration for ${AWS::StackName} in ${StageName} environment"

  # --- API Gateway Access Logs ---
  HttpApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}-httpapi-${StageName}"
      RetentionInDays: 30

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      AccessLogSettings:
        DestinationArn: !GetAtt HttpApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage","errorMessage":"$context.error.message"}'
      # 🛡️ [Concurrency Protection] API Gateway frontline defense - Fuse role
      # BurstLimit > RateLimit: Allow short traffic spikes, block sustained overload
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100  # 순간 최대 요청 허용량
        ThrottlingRateLimit: 50    # 초당 지속 요청 제한
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        AllowMethods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
        AllowHeaders: 
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token
        AllowCredentials: true
        MaxAge: 300
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Ref CognitoIssuerUrl
              audience: [!Ref CognitoAudience]
        DefaultAuthorizer: CognitoAuthorizer

  # --- WebSocket API ---
  WebsocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "backend-websocket-${StageName}"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"
      DisableExecuteApiEndpoint: false  # Enable default endpoint for WebSocket

  # [Fix] Explicit Authorizer Resource (SAM does not support inline Auth for V2 WebSocket)
  WebsocketConnectAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      Name: WebsocketConnectAuthorizer
      ApiId: !Ref WebsocketApi
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebsocketAuthorizerFunction.Arn}/invocations"
      IdentitySource:
        - "route.request.querystring.token"
      # ReauthorizeEvery is not a direct property of V2 Authorizer, it's part of Authorizer caching which isn't natively exposed in V2 Properties easily or defaults to TTL.
      # Viewing 'AuthorizerPayloadFormatVersion' is for HTTP API, not WebSocket.

  WebsocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebsocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref WebsocketConnectAuthorizer
      Target: !Sub "integrations/${WebsocketConnectIntegration}"

  WebsocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebsocketApi
      RouteKey: $disconnect
      Target: !Sub "integrations/${WebsocketDisconnectIntegration}"

  WebsocketConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebsocketConnectFunction.Arn}/invocations"

  WebsocketDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebsocketDisconnectFunction.Arn}/invocations"

  # [Fix] $default 라우트 추가 - 클라이언트 메시지 처리
  WebsocketDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebsocketApi
      RouteKey: $default
      Target: !Sub "integrations/${WebsocketDefaultIntegration}"

  WebsocketDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebsocketDefaultFunction.Arn}/invocations"

  WebsocketDeploymentV2:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn: [WebsocketConnectRoute, WebsocketDisconnectRoute, WebsocketDefaultRoute]
    Properties:
      ApiId: !Ref WebsocketApi
      Description: !Sub "Deployment for ${StageName} - ${AWS::StackName}"

  WebsocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebsocketApi
      DeploymentId: !Ref WebsocketDeploymentV2
      StageName: !Ref StageName

  # --- Functions (LangSmith 적용 그룹) ---

  WebsocketAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.websocket_authorizer.lambda_handler"]
      Environment:
        Variables:
          COGNITO_ISSUER_URL: !Ref CognitoIssuerUrl
          APP_CLIENT_ID: !Ref CognitoAudience
          # 필요한 경우 추가 (auth_utils 로직에 따라)
          COGNITO_REGION: !Ref AWS::Region

  WebsocketAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebsocketAuthorizerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebsocketApi}/authorizers/*"



  RunWorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.run_workflow.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          WORKFLOW_ORCHESTRATOR_ARN: !Ref StepFunctionOrchestrator
          WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !Ref StepFunctionDistributedOrchestrator
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          APP_VERSION: "1.0.0"
          IDEMPOTENCY_TABLE: !Ref IdempotencyTableV3
          STREAM_INLINE_THRESHOLD_BYTES: "250000"
          USERS_TABLE: !Ref UsersTableV3
          SKILLS_TABLE: !Ref SkillsTableV3
          # 🚀 동적 오케스트레이터 선택 및 캐시 최적화 설정
          WORKFLOW_CACHE_MAX_SIZE: "1000"
          WORKFLOW_CACHE_TTL_SECONDS: "600"  # 10분
          ORCHESTRATOR_SELECTION_ENABLED: "true"
          # 성능 최적화 임계값
          DISTRIBUTED_MODE_SEGMENT_THRESHOLD: "300"
          EVENT_HISTORY_THRESHOLD: "20000"
          COMPLEXITY_SCORE_THRESHOLD: "80"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBReadPolicy:
            TableName: !Ref SkillsTableV3
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionOrchestrator.Name
        # 🚀 Distributed Map 오케스트레이터 실행 권한 추가
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionDistributedOrchestrator.Name
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows/{id}/run
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  RecoverUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: recover-users-v2
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.recover_users.lambda_handler"]
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Select [3, !Split ["/", !Ref CognitoIssuerUrl]]
          USERS_TABLE: !Ref UsersTableV3
          DRY_RUN: "false"
      Policies:
        - Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
              - cognito-idp:ListUsers
            Resource:
              - !Sub
                  - "arn:aws:cognito-idp:${AWS::Region}:${AccountId}:userpool/${UserPoolId}"
                  - AccountId: !Ref "AWS::AccountId"
                    UserPoolId: !Select [3, !Split ["/", !Ref CognitoIssuerUrl]]
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableV3

  # --- Create User Function (Cognito PostConfirmation Trigger) ---
  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.create_user.lambda_handler"]
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableV3

  # ⚠️ ARCHITECTURE WARNING: PackageType: Image functions must use linux/arm64 ECR images
  # Globals sets arm64 architecture, but ECR images MUST be built for linux/arm64 platform
  #
  # 🚨 CRITICAL CI/CD REQUIREMENTS:
  # 1. Build command: docker build --platform linux/arm64 -t myimage .
  # 2. Push command: docker push --platform linux/arm64
  # 3. SAM build: sam build --use-container (uses arm64 container)
  # 4. GitHub Actions: use ubuntu-latest-arm64 runner or specify platform
  #
  # ❌ FAILURE SYMPTOMS: "Exec format error" when Lambda tries to run x86_64 image on arm64 runtime
  # ✅ VERIFICATION: docker inspect <image> | grep Architecture → should show "arm64"
  # [REMOVED] PartitionWorkflowFunction — handler file src.services.partition_workflow_lambda
  # does not exist. Partitioning is now handled by InitializeStateDataFunction.

  InitializeStateDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.common.initialize_state_data.lambda_handler"]
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          MANIFESTS_TABLE: !Ref WorkflowManifestsV3
          BLOCK_REFERENCES_TABLE: !Ref WorkflowBlockReferencesV3
          # 🗂️ [S3 Offload] State offloading for large payloads (>256KB)
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          # 🔧 [Fix] USC가 state_data_manager 모듈 import 시 필요
          STATE_STORAGE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          MAX_PAYLOAD_SIZE_KB: "200"
          STREAM_INLINE_THRESHOLD_BYTES: "200000"  # 200KB threshold (safer than 250KB)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTableV3
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTableV3
        # Merkle DAG manifest storage — InitializeState creates the manifest
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowManifestsV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowBlockReferencesV3
        # 🗂️ [S3 Offload] Write permissions for large state storage
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # 🔄 [Phase 10: 2PC GC] SQS send permission for GC DLQ (Phase 2 failure cleanup)
        - SQSSendMessagePolicy:
            QueueName: !GetAtt GCDeadLetterQueue.QueueName
        # 🏷️ [2PC Tagging] S3 object tagging for Merkle DAG pending/committed status
        - Statement:
          - Effect: Allow
            Action:
              - s3:PutObjectTagging
              - s3:GetObjectTagging
              - s3:DeleteObjectTagging
            Resource: !If
              - CreateWorkflowStateBucket
              - !Sub "${WorkflowStateBucketResource.Arn}/*"
              - !Sub "arn:aws:s3:::${WorkflowStateBucket}/*"

  # SegmentRunnerFunction - Heavy dependencies required (langgraph, etc.)
  # 🛡️ [1단계: Reserved Concurrency] 워크플로우 엔진 동시성 제한
  # - 에이전트 폭주가 시스템 전체를 마비시키지 않도록 Isolation
  # - 계정 한도 1000 보호 (이 함수: 200, 다른 중요 함수들: 나머지)
  SegmentRunnerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.segment_runner_handler.lambda_handler"]
      Timeout: 300  # 5분 - 대용량 페이로드 및 LLM 호출 시간 고려
      # 🚀 [v2.0 Cold Start 최적화] 메모리 상향: 1024 → 2048 MB
      # - vCPU 2배 할당으로 패키지 로딩 속도 ~2배 향상
      # - Cold Start 비용 = (시간 × 메모리 가격), 시간 절반이면 비용 상쇄
      MemorySize: 2048
      # 🛡️ Reserved Concurrency: 계정 한도 1000 중 200 예약
      ReservedConcurrentExecutions: 200
      Environment:
        Variables:
          # ============================================
          # 🚀 [v2.0 Cold Start 최적화] Python 런타임 환경 변수
          # ============================================
          # PYTHONOPTIMIZE=1: assert문 및 __debug__ 코드 무시, 바이트코드 크기 감소
          PYTHONOPTIMIZE: "1"
          # PYTHONDONTWRITEBYTECODE=1: 읽기 전용 Lambda 파일시스템에 .pyc 쓰기 시도 방지
          PYTHONDONTWRITEBYTECODE: "1"
          # PYTHONUNBUFFERED=1: stdout/stderr 버퍼링 비활성화 (로그 즉시 출력)
          PYTHONUNBUFFERED: "1"
          # ============================================
          # AWS Lambda Powertools 최적화
          # ============================================
          POWERTOOLS_DEV: "0"
          POWERTOOLS_LOG_DEDUPLICATION_DISABLED: "1"
          # ============================================
          # 기존 환경 변수
          # ============================================
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          MANIFESTS_TABLE: !Ref WorkflowManifestsV3
          BLOCK_REFERENCES_TABLE: !Ref WorkflowBlockReferencesV3
          USERS_TABLE: !Ref UsersTableV3
          IDEMPOTENCY_TABLE: !Ref IdempotencyTableV3
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          APP_VERSION: "1.0.0"
          WORKFLOW_MASTER_KEY_SECRET_NAME: !Ref OpenAISecret # Fallback for now
          STREAM_INLINE_THRESHOLD_BYTES: "250000"
          OPENAI_API_KEY: !Ref OpenAiApiKey
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GOOGLE_API_KEY: !Ref GoogleApiKey
          # 🚀 [NEW] EventBridge 통합을 위한 환경 변수
          WORKFLOW_EVENT_BUS_NAME: !Ref WorkflowEventBus
          # 🚀 [NEW] Step Functions 개선사항 관련 환경 변수
          ALLOW_UNSAFE_EXECUTION: "false"
          FORCE_CHILD_WORKFLOW: "false"
          # 🛡️ [Quality Kernel] Distributed state table for concurrency control
          KERNEL_STATE_TABLE: !Ref KernelStateTable
          # 🗂️ [S3 Offload] State offloading bucket for large payloads (>256KB)
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          # 🔍 [v3.5] None Reference Tracing - 디버깅용 (NoneType 에러 추적)
          NONE_TRACE_ENABLED: "1"
          # [REACT] VSM governance endpoint for ReactExecutor
          ANALEMMA_KERNEL_ENDPOINT: !GetAtt VSMFunctionUrl.FunctionUrl
          ANALEMMA_VSM_API_KEY: !Sub "analemma-vsm-${StageName}-${AWS::AccountId}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowManifestsV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowBlockReferencesV3
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableV3
        # 🛡️ [Quality Kernel] Distributed state synchronization
        - DynamoDBCrudPolicy:
            TableName: !Ref KernelStateTable
        # 🛡️ [v2.1] Agent Governance - Audit Log Write Permission
        - DynamoDBCrudPolicy:
            TableName: !Ref GovernanceAuditLogV3
        - S3CrudPolicy:
             BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # 🧪 [LLM Simulator] Vision 테스트용 S3 이미지 접근 권한
        - S3ReadPolicy:
            BucketName: analemma-workflows-dev
        # 🧪 [LLM Simulator] Vision/Stage3/Stage4 테스트 이미지 버킷 읽기 권한
        - S3ReadPolicy:
            BucketName: analemma-test-assets
        # 🚀 [NEW] EventBridge 발행 권한 추가
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WorkflowEventBus
        - Statement:
          - Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: 
              - !Ref OpenAISecret
              - !Ref GeminiSecret
              - !Ref AnthropicSecret
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:backend-workflow-${StageName}-vertex_ai_config-*"
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:backend-workflow-${StageName}-gcp_service_account-*"
          - Effect: Allow
            Action: bedrock:InvokeModel*
            Resource: "*"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
          - Effect: Allow
            Action:
              - dynamodb:TransactWriteItems
            Resource:
              - !GetAtt WorkflowManifestsV3.Arn
              - !GetAtt WorkflowBlockReferencesV3.Arn
          - Effect: Allow
            Action:
              - s3:PutObjectTagging
              - s3:GetObjectTagging
              - s3:DeleteObjectTagging
            Resource: !If
              - CreateWorkflowStateBucket
              - !Sub "${WorkflowStateBucketResource.Arn}/*"
              - !Sub "arn:aws:s3:::${WorkflowStateBucket}/*"
        # 🔄 [Phase 10: 2PC GC] SQS send permission for GC DLQ (Phase 2 failure cleanup)
        - SQSSendMessagePolicy:
            QueueName: !GetAtt GCDeadLetterQueue.QueueName

  # ── Lambda-Native VSM (VirtualSegmentManager) ─────────────────────────────
  # Governance pipeline for REACT segments — same codebase as local VSM.
  # SegmentRunnerFunction calls this via Function URL for tool governance.
  # Security: X-Analemma-Key header validation (shared key via env var).
  VSMFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.vsm.handler.handler"]
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ANALEMMA_VSM_API_KEY: !Sub "analemma-vsm-${StageName}-${AWS::AccountId}"

  # VSM Function URL — AuthType NONE at transport level; X-Analemma-Key
  # middleware in handler.py provides application-level auth.
  VSMFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt VSMFunction.Arn

  VSMFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VSMFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  # ── E2E IoT Core MQTT Proxy (waitForTaskToken bridge) ────────────────────
  # Routes SFN segment execution to a local MQTT subscriber via IoT Core.
  # Only active when E2E_MODE=true and E2EIoTEnabled is set.
  SegmentProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.segment_proxy_handler.lambda_handler"]
      Timeout: 30  # Only stores token + IoT publish; SFN waits via callback
      MemorySize: 256
      Environment:
        Variables:
          E2E_MODE: !If [E2EEnabled, 'true', 'false']
          E2E_IOT_ENDPOINT: !Ref E2EIoTEndpoint
          TASK_TOKENS_TABLE_NAME: !Ref TaskTokensTableV3
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskTokensTableV3
        - Statement:
            - Effect: Allow
              Action:
                - iot:Publish
              Resource:
                - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/analemma/e2e/*"
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]

  # ── E2E IoT Callback Lambda (result -> SendTaskSuccess) ────────────────────
  IoTCallbackFunction:
    Type: AWS::Serverless::Function
    Condition: E2EEnabled
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.iot_callback_handler.lambda_handler"]
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - states:SendTaskSuccess
                - states:SendTaskFailure
              Resource: "*"
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]

  # ── E2E IoT Core Resources ────────────────────────────────────────────────
  E2EIoTPolicy:
    Type: AWS::IoT::Policy
    Condition: E2EEnabled
    Properties:
      PolicyName: !Sub "analemma-e2e-iot-${StageName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iot:Connect
            Resource:
              - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:client/analemma-e2e-*"
          - Effect: Allow
            Action:
              - iot:Subscribe
            Resource:
              - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/analemma/e2e/+/task"
              - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/analemma/e2e/+/result"
          - Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource:
              - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/analemma/e2e/*"

  E2EIoTResultRule:
    Type: AWS::IoT::TopicRule
    Condition: E2EEnabled
    Properties:
      RuleName: !Sub "analemma_e2e_result_${StageName}"
      TopicRulePayload:
        Sql: "SELECT * FROM 'analemma/e2e/+/result'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt IoTCallbackFunction.Arn
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"

  E2EIoTRuleLambdaPermission:
    Type: AWS::Lambda::Permission
    Condition: E2EEnabled
    Properties:
      FunctionName: !Ref IoTCallbackFunction
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com
      SourceArn: !GetAtt E2EIoTResultRule.Arn

  # 🛡️ [Reserved Concurrency] 디자인 어시스턴트 동시성 제한
  # - 계정 한도 1000 중 50개 예약
  DesignAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.agentic_designer_handler.lambda_handler"]
      Timeout: 900
      # 🛡️ Reserved Concurrency: 계정 한도 1000 중 50 예약
      ReservedConcurrentExecutions: 50
      Environment:
        Variables:
          # [JWT Validation]
          COGNITO_ISSUER_URL: !Ref CognitoIssuerUrl
          APP_CLIENT_ID: !Ref CognitoAudience
          # ▼▼▼ [필수 추가] 이 변수가 없으면 WebSocket 전송 실패 (사일런트 에러 발생) ▼▼▼
          WEBSOCKET_ENDPOINT_URL: !Sub "https://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          WEBSOCKET_OWNER_ID_GSI: OwnerIdConnectionIndex
          # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲
      Policies:
        - Statement:
          - Effect: Allow
            Action: bedrock:InvokeModel*
            Resource: "*"
            # WebSocket 전송 권한 추가
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:PostToConnection
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:DeleteItem
            Resource: 
              - !GetAtt WebsocketConnectionsTableV3.Arn
              - !Sub "${WebsocketConnectionsTableV3.Arn}/index/OwnerIdConnectionIndex"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /design-assistant
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        ApiEventPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /design-assistant
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  # [추가] 명시적인 Function URL 리소스 정의 (참조 안정성 확보)
  # 🔒 SECURITY: AWS_IAM for access control
  # Frontend should use AWS SDK with temporary credentials or CloudFront OAC
  DesignAssistantFunctionUrlResource:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM  # 🔒 보안 강화: 인증 필수
      TargetFunctionArn: !GetAtt DesignAssistantFunction.Arn
      # InvokeMode: RESPONSE_STREAM # 스트리밍 모드 - 리전 지원 확인 후 활성화
      Cors:
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        AllowMethods:
          - "GET"
          - "POST"

  # 🛡️ [Reserved Concurrency] 비동기 LLM 핸들러 동시성 제한
  # - ECS Fargate 백업이 있으므로 Lambda 한도 초과 시 오버플로우 가능
  # - 계정 한도 1000 중 100개 예약
  AsyncLLMHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.async_llm_handler.lambda_handler"]
      Timeout: 900
      # 🛡️ Reserved Concurrency: 계정 한도 1000 중 100 예약
      ReservedConcurrentExecutions: 100
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          USERS_TABLE: !Ref UsersTableV3
          IDEMPOTENCY_TABLE: !Ref IdempotencyTableV3
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          APP_VERSION: "1.0.0"
          WORKFLOW_MASTER_KEY_SECRET_NAME: !Ref OpenAISecret
          STREAM_INLINE_THRESHOLD_BYTES: "250000"
          ASYNC_WORKER_ECS_CLUSTER: !If [HasAsyncWorkerTaskDefinition, !Sub "backend-cluster-${StageName}", ""]
          ASYNC_WORKER_TASK_DEFINITION: !If [HasAsyncWorkerTaskDefinition, !Ref AsyncWorkerTaskDefinition, ""]
          ASYNC_WORKER_SUBNET_IDS: !Ref AsyncWorkerSubnetIds
          ASYNC_WORKER_SECURITY_GROUP_IDS: !Ref AsyncWorkerSecurityGroupIds
          OPENAI_API_KEY: !Ref OpenAiApiKey
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GOOGLE_API_KEY: !Ref GoogleApiKey
      Policies:
        - Statement:
          - Effect: Allow
            Action: bedrock:InvokeModel*
            Resource: "*"
          # FIX: states:SendTaskSuccess/Failure is "not resource-type specific" per AWS IAM docs.
          # Task tokens are not ARN-addressable → Resource: "*" is the only valid form.
          # Using a stateMachine/execution ARN causes resource type mismatch → AccessDeniedException.
          - Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            Resource: "*"
          - Effect: Allow
            Action:
              - states:GetExecutionHistory
              - states:DescribeExecution
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowOrchestrator-${StageName}:*"
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowDistributedOrchestrator-${StageName}:*"
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: 
              - !Sub 
                  - "arn:aws:s3:::${BucketName}/*"
                  - BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          - Effect: Allow
            Action:
              - ecs:RunTask
              - ecs:DescribeTasks
              - ecs:StopTask
              # [수정] 이름만 입력받아도 ARN으로 변환되도록 !Sub 사용. 빈 값일 경우 * 사용.
            Resource: !If 
              - HasAsyncWorkerTaskDefinition
              - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/${AsyncWorkerTaskDefinition}:*"
              - "*"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: 
                !If 
                  - HasAsyncWorkerExecutionRole
                  - !Ref AsyncWorkerExecutionRoleArn
                  - !GetAtt AsyncWorkerTaskExecutionRole.Arn
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:DescribeTable
            Resource:
              - !GetAtt WorkflowsTableV3.Arn
              - !GetAtt TaskTokensTableV3.Arn
              - !GetAtt IdempotencyTableV3.Arn
              - !Sub "${WorkflowsTableV3.Arn}/index/*"
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableV3

  GetExecutionHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.get_execution_history.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExecutionsTableV3
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/{id}/history
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # --- Functions (LangSmith 미적용 그룹) ---

  GetWorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.get_workflow.lambda_handler"]
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  GetWorkflowByNameFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.get_workflow_by_name.lambda_handler"]
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /by-name
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  DeleteWorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.delete_workflow.lambda_handler"]
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows/{id}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer

  SaveWorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.save_workflow.lambda_handler"]
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          APP_VERSION: "1.0.0"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        ApiEventUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows/{id}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  # --- Co-design Assistant API Functions ---
  CodesignAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.codesign_api_handler.lambda_handler_sync"]
      Timeout: 10  # API Gateway 엔드포인트는 즉시 응답 (task_id 반환)
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAiApiKey
          BEDROCK_REGION: !Ref AWS::Region
          COGNITO_ISSUER_URL: !Ref CognitoIssuerUrl
          COGNITO_AUDIENCE: !Ref CognitoAudience
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          CODESIGN_WORKER_FUNCTION: !Ref CodesignWorkerFunction
      Policies:
        - Statement:
          - Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: 
              - !Ref OpenAISecret
              - !Ref GeminiSecret
              - !Ref AnthropicSecret
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:backend-workflow-${StageName}-vertex_ai_config-*"
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:backend-workflow-${StageName}-gcp_service_account-*"
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource: "*"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource: !GetAtt CodesignWorkerFunction.Arn
      Events:
        CodesignStreamEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /codesign
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        CodesignExplainEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /codesign/explain
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        CodesignSuggestionsEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /codesign/suggestions
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        CodesignApplySuggestionEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /codesign/apply-suggestion
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  # --- Codesign Worker Function (비동기 처리용, 타임아웃 회피) ---
  CodesignWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "codesign-worker-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.codesign_worker_handler.lambda_handler"]
      Timeout: 900  # 15분 - 실제 처리 시간
      MemorySize: 2048
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAiApiKey
          BEDROCK_REGION: !Ref AWS::Region
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          WEBSOCKET_ENDPOINT_URL: !Sub "https://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          WEBSOCKET_OWNER_ID_GSI: OwnerIdConnectionIndex
      Policies:
        - Statement:
          - Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: 
              - !Ref OpenAISecret
              - !Ref GeminiSecret
              - !Ref AnthropicSecret
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:backend-workflow-${StageName}-vertex_ai_config-*"
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:backend-workflow-${StageName}-gcp_service_account-*"
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource: "*"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBReadPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:PostToConnection
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebsocketApi}/*/@connections/*"

  # --- Plan Briefing & Time Machine API Functions ---
  PlanBriefingFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.plan_briefing_handler.lambda_handler_entry"]
      Timeout: 60
      Environment:
        Variables:
          EXECUTION_TABLE: !Ref ExecutionsTableV3
          NOTIFICATION_TABLE: !Ref PendingNotificationsTableV3
          CONFIRMATION_TOKENS_TABLE: !Ref ConfirmationTokensTable
          WORKFLOW_BRANCHES_TABLE: !Ref WorkflowBranchesTable
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          ROOT_THREAD_INDEX: root-thread-index
          OPENAI_API_KEY: !Ref OpenAiApiKey
          WORKFLOW_ORCHESTRATOR_ARN: !Ref StepFunctionOrchestrator
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBReadPolicy:
            TableName: !Ref PendingNotificationsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref CheckpointsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfirmationTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowBranchesTable
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionOrchestrator.Name
      Events:
        # Workflow Preview
        WorkflowPreviewEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows/preview
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        DetailedDraftEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workflows/preview/detailed-draft
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        # Execution Timeline & Checkpoints
        TimelineEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/{id}/timeline
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        CheckpointsListEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/{id}/checkpoints
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        CheckpointDetailEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/{id}/checkpoints/{checkpoint_id}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        # Time Machine Operations
        RollbackPreviewEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/rollback/preview
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        RollbackExecuteEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/rollback
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        CheckpointCompareEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/checkpoints/compare
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        BranchHistoryEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/{id}/branches
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        RollbackSuggestionsEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/{id}/rollback-suggestions
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # --- Task Manager API Functions ---
  TaskManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.task_api_handler.lambda_handler"]
      Timeout: 30
