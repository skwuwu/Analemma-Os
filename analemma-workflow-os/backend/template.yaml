      Environment:
        Variables:
          SKILLS_TABLE: !Ref SkillsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SkillsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /skills/{id}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  DeleteSkillFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.skills_api.lambda_handler"]
      Environment:
        Variables:
          SKILLS_TABLE: !Ref SkillsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SkillsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /skills/{id}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer

  ListExecutionsFunction:
    Type: AWS::Serverless::Function
    Properties:
