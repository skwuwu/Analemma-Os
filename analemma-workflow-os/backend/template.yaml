            Resource: "*"
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /executions/stop
            Method: POST

  ListNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.list_notifications.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          NOTIFICATIONS_INDEX: NotificationsIndex
          STATUS_INDEX: OwnerIdStatusIndex
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExecutionsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /notifications
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  DismissNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.dismiss_notification.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /notifications/dismiss
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  # ============================================
  # 📁 MediaUploadFunction - 미디어 파일 업로드 API
  # ============================================
  # 프론트엔드에서 이미지/비디오 업로드 → S3 URL 반환
  # RunWorkflow 호출 시 S3 URL만 전달 (Step Functions 256KB 제한 회피)
  MediaUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.media.upload_handler.lambda_handler"]
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          MEDIA_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          MAX_FILE_SIZE_MB: "50"
          PRESIGN_EXPIRY_SECONDS: "3600"
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Events:
        UploadEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/media/upload
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        PresignEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/media/presign
            Method: POST

  ResumeHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.resume_handler.lambda_handler"]
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TaskTokensTableV3
        - Statement:
          - Effect: Allow
            Action: states:SendTaskSuccess
            Resource: "*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /resume
            Method: POST

  WebsocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.websocket_connect.lambda_handler"]
      Environment:
        Variables:
          # 검증 로직 제거로 인해 Cognito 관련 변수가 불필요할 수 있으나,
          # 코드 내 다른 로직(사용자 정보 조회 등)에서 쓸 수 있으므로 Env Vars는 유지해도 무방함.
          COGNITO_ISSUER_URL: !Ref CognitoIssuerUrl
          APP_CLIENT_ID: !Ref CognitoAudience
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          STATUS_INDEX: OwnerIdStatusIndex
          PENDING_NOTIFICATIONS_TABLE: !Ref PendingNotificationsTableV3
          PENDING_NOTIFICATIONS_OWNER_STATUS_INDEX: OwnerIdStatusIndex
      Policies:
        # [삭제됨] AmazonCognitoReadOnly -> Authorizer가 검증하므로 Connect 핸들러는 Cognito 접근 불필요
        - DynamoDBCrudPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref PendingNotificationsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:PostToConnection
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"
        - Statement:
          - Effect: Allow
            Action: states:DescribeExecution
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowOrchestrator-${StageName}:*"
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowDistributedOrchestrator-${StageName}:*"

  WebsocketDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.websocket_disconnect.lambda_handler"]
      Environment:
        Variables:
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebsocketConnectionsTableV3

  # [Fix] $default 라우트 핸들러 - 클라이언트 메시지 처리 (ping, subscribe 등)
  WebsocketDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.websocket_default.lambda_handler"]
      Environment:
        Variables:
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:PostToConnection
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"

  # Lambda Permission for $default route
  WebsocketDefaultFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebsocketDefaultFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebsocketApi}/*/$default"

  NotifyUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.notify_result.lambda_handler"]
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub "wss://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_ENDPOINT_URL: !Sub "https://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          WEBSOCKET_OWNER_ID_GSI: OwnerIdConnectionIndex
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          PENDING_NOTIFICATIONS_TABLE: !Ref PendingNotificationsTableV3
          PENDING_NOTIFICATIONS_EXECUTION_ID_INDEX: ExecutionIdIndex
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref PendingNotificationsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"
          - Effect: Allow
            Action: ses:SendEmail
            Resource: "*"

  ExecutionProgressNotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.execution_progress_notifier.lambda_handler"]
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub "wss://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_ENDPOINT_URL: !Sub "https://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          WEBSOCKET_OWNER_ID_GSI: OwnerIdConnectionIndex
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          # DB 업데이트 전략 관련
          DB_UPDATE_STRATEGY: !Ref DbUpdateStrategy
          DB_UPDATE_INTERVAL_SECONDS: !Ref DbUpdateInterval
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"
          - Effect: Allow
            Action: cloudwatch:PutMetricData
            Resource: "*"

  # [추가] 워크플로우 성공 이벤트 감지 규칙
  WorkflowSuccessRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref WorkflowEventBus
      EventPattern:
        source:
          - "backend-workflow"
        detail-type:
          - "WorkflowExecutionSucceeded"
      Targets:
        - Id: "NotifyExecutionSuccess"
          Arn: !GetAtt ExecutionProgressNotifierFunction.Arn

  # [추가] EventBridge가 Lambda를 호출할 수 있도록 권한 부여
  WorkflowSuccessRulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExecutionProgressNotifierFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowSuccessRule.Arn

  # --- Collector Lambda Function (EventBridge Publisher) ---
  CollectorLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.collector_lambda.lambda_handler"]
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref WorkflowEventBus
          EVENT_SOURCE: "com.analemma.workflow-collector"
          DETAIL_TYPE: "Workflow Event Collected"
      Policies:
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WorkflowEventBus
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /collect
            Method: POST

  # --- [NEW] Auto Healing Trigger Function (v3.9 Hybrid Architecture) ---
  # 🩹 Step Functions 실패 시 EventBridge에서 자동 트리거
  # - 에러 분류 (Deterministic vs Semantic)
  # - Deterministic: QuickFixExecutor 호출 (자동 복구)
  # - Semantic: AWAITING_MANUAL_HEALING 상태 설정
  AutoHealingTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.auto_healing_trigger.lambda_handler"]
      FunctionName: !Sub "auto-healing-trigger-${StageName}"
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          QUICK_FIX_FUNCTION_NAME: !Sub "quick-fix-executor-${StageName}"
          NOTIFICATION_BUS_NAME: !Ref WorkflowEventBus
          MAX_SELF_HEALING_ATTEMPTS: "3"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - dynamodb:Scan
            Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ExecutionsTableV3}"
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WorkflowEventBus
        - Statement:
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:quick-fix-executor-${StageName}"

  # --- Indexer Function (Execution History Storage) ---
  IndexerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.indexer.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          OWNER_INDEX: OwnerIdStartDateIndex
          # ▼▼▼ [추가] WebSocket 전송을 위한 환경 변수 ▼▼▼
          WEBSOCKET_ENDPOINT_URL: !Sub "https://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          WEBSOCKET_OWNER_ID_GSI: OwnerIdConnectionIndex
          # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - Statement:
          - Effect: Allow
            Action: states:DescribeExecution
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowOrchestrator-${StageName}:*"
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowDistributedOrchestrator-${StageName}:*"
            # ▼▼▼ [추가] WebSocket 메시지 전송 및 연결 조회 권한 ▼▼▼
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:PostToConnection
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:DeleteItem
            Resource: 
              - !GetAtt WebsocketConnectionsTableV3.Arn
              - !Sub "${WebsocketConnectionsTableV3.Arn}/index/OwnerIdConnectionIndex"
            # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

  # --- Finalizer Function (Idempotency Management) ---
  # FinalizerFunction - Convert to Docker Image due to size limit
  FinalizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.finalizer.lambda_handler"]
      Environment:
        Variables:
          IDEMPOTENCY_TABLE: !Ref IdempotencyTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTableV3
        # ▼▼▼ [필수 추가] EventBridge 페이로드 누락 시 원본 데이터 조회를 위해 필요 ▼▼▼
        - Statement:
          - Effect: Allow
            Action: states:DescribeExecution
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowOrchestrator-${StageName}:*"
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowDistributedOrchestrator-${StageName}:*"
        # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

  # --- Usage Aggregator Function (Cost Calculation & User Usage Tracking) ---
  UsageAggregatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.usage_aggregator.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          USER_USAGE_TABLE: !Ref UserUsageTableV3
          PRICING_CONFIG_PARAM: !Sub "/analemma/${StageName}/pricing"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref UserUsageTableV3
        - Statement:
          - Effect: Allow
            Action: ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/analemma/${StageName}/pricing"
        # ▼▼▼ [필수 추가] EventBridge 페이로드 누락 시 원본 데이터 조회를 위해 필요 ▼▼▼
        - Statement:
          - Effect: Allow
            Action: states:DescribeExecution
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowOrchestrator-${StageName}:*"
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowDistributedOrchestrator-${StageName}:*"
        # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

  MergeCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.merge_callback.handler"]
      Environment:
        Variables:
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          # 🗂️ [S3 Offload] State offloading bucket for large payloads (>256KB)
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          STREAM_INLINE_THRESHOLD_BYTES: "250000"
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]

  StateDataManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.state_data_manager.lambda_handler"]
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          STATE_STORAGE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          MAX_PAYLOAD_SIZE_KB: "200"
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action:
              - s3:PutObjectAcl
              - s3:GetObjectVersion
              - s3:DeleteObjectVersion
            Resource: !Sub
              - "${BucketArn}/*"
              - BucketArn: !If 
                - CreateWorkflowStateBucket
                - !GetAtt WorkflowStateBucketResource.Arn
                - !Sub "arn:aws:s3:::${WorkflowStateBucket}"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"

  # --- Distributed Map Functions (Event History Limit Solution) ---
  # 💡 메모리 최적화 참고: 배포 후 AWS Compute Optimizer로 실제 사용량 확인 권장
  PrepareDistributedExecutionFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.prepare_distributed_execution.lambda_handler"]
      Timeout: 300  # 5분 - 대용량 워크플로우 분석 시간
      MemorySize: 1024  # 📉 최적화: 2048 → 1024 (Compute Optimizer 권장값 적용 후 조정)
      Environment:
        Variables:
          LOG_LEVEL: INFO
          MAX_CHUNK_SIZE: "500"
          DEFAULT_CHUNK_SIZE: "100"
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - CloudWatchLogsFullAccess
        # 🚨 [Critical Fix] S3 업로드 권한 추가 - 누락된 필수 권한
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"

  # [REMOVED] Placeholder AggregateReportFunction - 존재하지 않는 핸들러 참조
  # 시뮬레이터용은 SimulatorAggregateReportFunction (src.handlers.simulator.aggregate_report)

  # 🛡️ [Reserved Concurrency] 청크 처리 함수 동시성 제한
  # - Distributed Map에서 병렬 호출되어 폭발적 동시성 발생 가능
  # - 계정 한도 1000 중 150개 예약 (Map 병렬도 제어)
  ProcessSegmentChunkFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.process_segment_chunk.lambda_handler"]
      Timeout: 900  # 15분 - 청크 처리 최대 시간
      MemorySize: 2048  # 청크 내 여러 세그먼트 처리를 위한 큰 메모리
      # 🛡️ Reserved Concurrency: 계정 한도 1000 중 150 예약 (Distributed Map 폭발 방지)
      ReservedConcurrentExecutions: 150
      # 🚨 [Critical Fix] /tmp 공간 확장 - 캐시 최적화
      EphemeralStorage:
        Size: 1024  # 1GB /tmp 공간 (기본 512MB에서 확장)
      Environment:
        Variables:
          LOG_LEVEL: INFO
          DISTRIBUTED_FAIL_FAST: "true"
          WORKFLOW_EVENT_BUS_NAME: !Ref WorkflowEventBus
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          STREAM_INLINE_THRESHOLD_BYTES: "250000"
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          USERS_TABLE: !Ref UsersTableV3
          IDEMPOTENCY_TABLE: !Ref IdempotencyTableV3
          MOCK_MODE: !Ref MockMode
          # 🚨 [Critical Fix] 캐시 설정 환경 변수
          CACHE_MAX_SIZE_MB: "400"  # 1GB /tmp의 40%
          CACHE_CLEANUP_THRESHOLD: "0.8"  # 80% 사용 시 정리
          IJSON_REQUIRED: "false"  # ijson 없어도 동작 (폴백 지원)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTableV3
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WorkflowEventBus
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: 
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:workflow-master-key-*"
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:openai-api-key-*"
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: "*"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"

  AggregateDistributedResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.aggregate_distributed_results.lambda_handler"]
      Timeout: 600  # 10분 - 대용량 결과 집계 시간
      MemorySize: 2048  # 많은 청크 결과 병합을 위한 큰 메모리
      Environment:
        Variables:
          LOG_LEVEL: INFO
          DISTRIBUTED_FAILURE_POLICY: "fail_on_any_failure"  # fail_on_any_failure, fail_on_majority_failure
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          WORKFLOW_STATE_TABLE: !Ref WorkflowsTableV3
          # 🚨 [Critical Fix] S3 정리 설정
          CLEANUP_INTERMEDIATE_STATES: "true"
          CLIENT_SORT_THRESHOLD: "50000"  # 클라이언트 정렬 임계값
          # 🚨 [Critical Fix] 일관성 및 페이로드 관리
          S3_CONSISTENCY_MAX_RETRIES: "3"
          LARGE_STATE_THRESHOLD_KB: "200"
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"

  # --- State Continuity Functions (Critical Fix #1) ---
  LoadLatestStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.load_latest_state.lambda_handler"]
      Timeout: 30
      MemorySize: 512
      Description: "[Critical Fix #1] 상태 연속성 - 이전 청크의 latest_state.json 로드"
      Environment:
        Variables:
          LOG_LEVEL: INFO
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          WORKFLOW_STATE_TABLE: !Ref WorkflowsTableV3
      Policies:
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTableV3

  SaveLatestStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.save_latest_state.lambda_handler"]
      Timeout: 60  # 🚨 증가: 라이프사이클 정책 설정 시간 고려
      MemorySize: 512
      Description: "[Critical Fix #1] 상태 연속성 - latest_state.json 덮어쓰기 + 레이스 컨디션 방지"
      Environment:
        Variables:
          LOG_LEVEL: INFO
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          WORKFLOW_STATE_TABLE: !Ref WorkflowsTableV3
          # 🚨 [Critical Fix] 스토리지 비용 관리 환경 변수
          CHUNK_BACKUP_POLICY: "selective"  # none, selective, all
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3

  ResumeChunkProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.resume_chunk_processing.lambda_handler"]
      Timeout: 900  # 15분 - 재개 후 남은 세그먼트 처리
      MemorySize: 2048
      Description: "[Critical Fix #3] HITL 콜백 후 중단 지점 이후 세그먼트 재계산 및 실행"
      Environment:
        Variables:
          LOG_LEVEL: INFO
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          WORKFLOW_STATE_TABLE: !Ref WorkflowsTableV3
          TASK_TOKEN_TABLE: !Ref TaskTokensTableV3
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskTokensTableV3
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: 
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:workflow-master-key-*"
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:openai-api-key-*"
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: "*"

  # --- Distributed Task Token Storage Function ---
  StoreDistributedTaskTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.store_distributed_task_token.lambda_handler"]
      Timeout: 60  # 🚨 증가: S3 저장 시간 고려
      MemorySize: 512  # 🚨 증가: 대용량 상태 처리
      Description: "[Critical Fixes] 분산 실행 HITL Task Token 저장 - 고유성 보장 + 대용량 상태 지원"
      Environment:
        Variables:
          LOG_LEVEL: INFO
          TASK_TOKEN_TABLE: !Ref TaskTokensTableV3
          TASK_TOKENS_TABLE_NAME: !Ref TaskTokensTableV3  # 🚨 추가: 환경 변수 표준화
          # 🚨 [Critical Fix] 대용량 상태 처리를 위한 S3 설정
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskTokensTableV3
        # 🚨 [Critical Fix] 대용량 상태 S3 저장 권한 추가
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # AUTO_RESUME_HITP: 분산 청크/브랜치 HITP 자동 승인용 SFN 권한
        # states:SendTaskSuccess는 리소스 유형을 지원하지 않으므로 Resource: "*" 필요
        - Statement:
          - Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            Resource: "*"

  # Express Workflow removed - using alternative Event History mitigation strategies

  LogicalAuditorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "logical-auditor-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.logical_auditor.lambda_handler"]
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          LOG_LEVEL: INFO
      Policies:
        - Statement:
          - Effect: Allow
            Action: bedrock:InvokeModel*
            Resource: "*"
      Events:
        AuditApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /workflows/audit
            Auth:
              Authorizer: CognitoAuthorizer
        SimulateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /workflows/simulate
            Auth:
              Authorizer: CognitoAuthorizer


  EventHistoryMonitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.event_history_monitor.lambda_handler"]
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          WORKFLOW_ORCHESTRATOR_ARN: !Ref StepFunctionOrchestrator
          EVENT_HISTORY_LIMIT: "25000"
          EVENT_HISTORY_WARNING_THRESHOLD: "20000"
          EVENT_HISTORY_CRITICAL_THRESHOLD: "23000"
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - states:ListExecutions
              - states:GetExecutionHistory
              - states:DescribeExecution
            Resource: !Ref StepFunctionOrchestrator
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: "rate(1 hour)"
            Enabled: true

  # --- Intelligent Instruction Distiller Functions ---
  CorrectionApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-correction-api-v2"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.correction_api_handler.lambda_handler"]
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          CORRECTION_LOGS_TABLE: !Ref CorrectionLogsTable
          OPENAI_API_KEY: !Ref OpenAiApiKey
          GOOGLE_API_KEY: !Ref GoogleApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CorrectionLogsTable
      Events:
        LogCorrection:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /corrections
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        GetRecentCorrections:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /corrections/recent
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        SearchCorrections:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /corrections/search
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  CorrectionQualityProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-correction-quality-processor-v2"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.correction_quality_processor.lambda_handler"]
      Timeout: 60
      MemorySize: 512

      Environment:
        Variables:
          CORRECTION_LOGS_TABLE: !Ref CorrectionLogsTable
          OPENAI_API_KEY: !Ref OpenAiApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CorrectionLogsTable
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt CorrectionLogsTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 5  # 배치 크기 제한
            MaximumBatchingWindowInSeconds: 10
            # Fix #2: Partial Batch Failure 지원 활성화
            FunctionResponseTypes:
              - ReportBatchItemFailures
            # 재시도 설정 최적화
            MaximumRetryAttempts: 3
            ParallelizationFactor: 1  # 순차 처리로 안정성 확보

  StoreTaskTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.store_task_token.lambda_handler"]
      Timeout: 30  # auto_resume_delay(5s) + retries(3x) + WebSocket/DDB overhead
      Environment:
        Variables:
          TASK_TOKENS_TABLE_NAME: !Ref TaskTokensTableV3
          PENDING_NOTIFICATIONS_TABLE: !Ref PendingNotificationsTableV3
          WEBSOCKET_CONNECTIONS_TABLE: !Ref WebsocketConnectionsTableV3
          WEBSOCKET_OWNER_ID_GSI: OwnerIdConnectionIndex
          WEBSOCKET_ENDPOINT_URL: !Sub "https://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskTokensTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref PendingNotificationsTableV3
        - DynamoDBReadPolicy:
            TableName: !Ref WebsocketConnectionsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:PostToConnection
            Resource: !Sub
              - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/@connections/*"
              - AccountId: !Ref "AWS::AccountId"
        # AUTO_RESUME_HITP: Allow StoreTaskToken to call SendTaskSuccess for BOTH orchestrators
        # states:SendTaskSuccess is "not resource-type specific" per AWS IAM docs:
        # task tokens are not ARN-addressable → Resource: "*" is the only valid form.
        # Using a stateMachine ARN here causes a resource type mismatch → AccessDeniedException.
        - Statement:
          - Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            Resource: "*"

  # --- Manifest Regenerator Function (Dynamic Re-partitioning) ---
  ManifestRegeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.manifest_regenerator.lambda_handler"]
      MemorySize: 1024
      Timeout: 300  # 5분 (대규모 워크플로우 re-partitioning)
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          MANIFESTS_TABLE: !Ref WorkflowManifestsV3
          BLOCK_REFERENCES_TABLE: !Ref WorkflowBlockReferencesV3
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowManifestsV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowBlockReferencesV3
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          # FIX: states:SendTaskSuccess/Failure is "not resource-type specific" per AWS IAM docs.
          # Task tokens are not ARN-addressable → Resource: "*" is the only valid form.
          - Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            Resource: "*"
          - Effect: Allow
            Action:
              - dynamodb:TransactWriteItems
            Resource:
              - !GetAtt WorkflowManifestsV3.Arn
              - !GetAtt WorkflowBlockReferencesV3.Arn
          - Effect: Allow
            Action:
              - s3:PutObjectTagging
              - s3:GetObjectTagging
              - s3:DeleteObjectTagging
            Resource: !If
              - CreateWorkflowStateBucket
              - !Sub "${WorkflowStateBucketResource.Arn}/*"
              - !Sub "arn:aws:s3:::${WorkflowStateBucket}/*"

  # --- Scheduler Function (EventBridge Scheduled Trigger) ---
  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.scheduler.lambda_handler"]
      Environment:
        Variables:
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
          SCHEDULED_INDEX_NAME: ScheduledWorkflowsIndex
          WORKFLOW_ORCHESTRATOR_ARN: !Sub
            - "arn:aws:states:${AWS::Region}:${AccountId}:stateMachine:WorkflowOrchestrator-${StageName}"
            - AccountId: !Ref "AWS::AccountId"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTableV3
        - Statement:
          - Effect: Allow
            Action: states:StartExecution
            Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:WorkflowOrchestrator-${StageName}"
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)

  # --- Step Functions State Machine (Standard) ---
  StepFunctionOrchestrator:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "WorkflowOrchestrator-${StageName}"
      DefinitionUri: src/aws_step_functions_v3.json
      # Force update: 2026-01-29 - Smart StateBag v3.0 with centralized state management
      DefinitionSubstitutions:
        InitializeStateDataArn: !GetAtt InitializeStateDataFunction.Arn
        WorkflowEventBusArn: !GetAtt WorkflowEventBus.Arn
        ExecuteSegmentArn: !GetAtt SegmentRunnerFunction.Arn
        SegmentRunnerArn: !GetAtt SegmentRunnerFunction.Arn
        StateDataManagerArn: !GetAtt StateDataManagerFunction.Arn
        StoreTaskTokenArn: !GetAtt StoreTaskTokenFunction.Arn
        MergeCallbackArn: !GetAtt MergeCallbackFunction.Arn
        AsyncLLMHandlerArn: !GetAtt AsyncLLMHandlerFunction.Arn
        AggregateResultsArn: !GetAtt AggregateDistributedResultsFunction.Arn
        IdempotencyTable: !Ref IdempotencyTableV3
        # [E2E] Proxy Lambda ARN for hybrid tunnel testing
        SegmentProxyArn: !GetAtt SegmentProxyFunction.Arn
        # Express Workflow removed - using alternative Event History mitigation strategies
      Policies:
        # [REMOVED] PartitionWorkflowFunction — handler does not exist
        - LambdaInvokePolicy:
            FunctionName: !Ref SegmentRunnerFunction
        # [E2E] Invoke permission for SegmentProxyFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SegmentProxyFunction
        # [2순위 최적화] CheckIdempotencyFunction 제거 - Direct SDK로 대체
        - DynamoDBReadPolicy:
            TableName: !Ref IdempotencyTableV3
        - LambdaInvokePolicy:
            FunctionName: !Ref InitializeStateDataFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ExecutionProgressNotifierFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref MergeCallbackFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AsyncLLMHandlerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref StoreTaskTokenFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref StateDataManagerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AggregateDistributedResultsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref FinalizerFunction
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WorkflowEventBus
        # Express Workflow permissions removed

  # --- Step Functions State Machine (Distributed Map) ---
  StepFunctionDistributedOrchestrator:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "WorkflowDistributedOrchestrator-${StageName}"
      DefinitionUri: src/aws_step_functions_distributed_v3.json
      # Force update: 2026-01-29 - Smart StateBag v3.0 with Race-Condition-Free parallel processing
      DefinitionSubstitutions:
        InitializeStateDataArn: !GetAtt InitializeStateDataFunction.Arn
        WorkflowEventBusArn: !GetAtt WorkflowEventBus.Arn
        ExecuteSegmentArn: !GetAtt SegmentRunnerFunction.Arn
        SegmentRunnerArn: !GetAtt SegmentRunnerFunction.Arn
        StateDataManagerArn: !GetAtt StateDataManagerFunction.Arn
        StoreTaskTokenArn: !GetAtt StoreTaskTokenFunction.Arn
        MergeCallbackArn: !GetAtt MergeCallbackFunction.Arn
        AsyncLLMHandlerArn: !GetAtt AsyncLLMHandlerFunction.Arn
        IdempotencyTable: !Ref IdempotencyTableV3
        PrepareDistributedExecutionArn: !GetAtt PrepareDistributedExecutionFunction.Arn
        LoadLatestStateArn: !GetAtt LoadLatestStateFunction.Arn
        ProcessSegmentChunkArn: !GetAtt ProcessSegmentChunkFunction.Arn
        SaveLatestStateArn: !GetAtt SaveLatestStateFunction.Arn
        StoreDistributedTaskTokenArn: !GetAtt StoreDistributedTaskTokenFunction.Arn
        ResumeChunkProcessingArn: !GetAtt ResumeChunkProcessingFunction.Arn
        AggregateDistributedResultsArn: !GetAtt AggregateDistributedResultsFunction.Arn
        ExecuteBranchArn: !GetAtt SegmentRunnerFunction.Arn
        WorkflowStateBucket: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # [E2E] Proxy Lambda ARN for hybrid tunnel testing
        SegmentProxyArn: !GetAtt SegmentProxyFunction.Arn
      Policies:
        # 기존 함수들에 대한 권한
        # [REMOVED] PartitionWorkflowFunction — handler does not exist
        - LambdaInvokePolicy:
            FunctionName: !Ref SegmentRunnerFunction
        # [E2E] Invoke permission for SegmentProxyFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SegmentProxyFunction
        - DynamoDBReadPolicy:
            TableName: !Ref IdempotencyTableV3
        - LambdaInvokePolicy:
            FunctionName: !Ref InitializeStateDataFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ExecutionProgressNotifierFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref MergeCallbackFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AsyncLLMHandlerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref StoreTaskTokenFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref StateDataManagerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref FinalizerFunction
        # 새로운 Distributed Map 함수들에 대한 권한
        - LambdaInvokePolicy:
            FunctionName: !Ref PrepareDistributedExecutionFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ProcessSegmentChunkFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AggregateDistributedResultsFunction
        # [Critical Fix #1, #3] 상태 연속성 및 HITL 재개 함수들
        - LambdaInvokePolicy:
            FunctionName: !Ref LoadLatestStateFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SaveLatestStateFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ResumeChunkProcessingFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref StoreDistributedTaskTokenFunction
        # DynamoDB 및 EventBridge 권한
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref WorkflowEventBus
        # [Critical Fix #2] S3 ItemReader/ResultWriter 권한
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # Distributed Map 실행 권한 + Child Workflow 트리거 권한
        - Statement:
          - Effect: Allow
            Action:
              - states:StartExecution
              - states:DescribeExecution
              - states:StopExecution
            Resource: 
              # execution 리소스 (Distributed Map 내부 실행)
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:WorkflowDistributedOrchestrator-${StageName}:*"
              # stateMachine 리소스 (Child Workflow 트리거용)
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:WorkflowDistributedOrchestrator-${StageName}"
              # Standard Orchestrator (있는 경우)
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:WorkflowOrchestrator-${StageName}"

  # --- Express Workflow removed due to managed-rule creation limitations ---
  # Event History limit mitigation is now handled through:
  # 1. EventHistoryMonitorFunction - monitors usage and alerts
  # 2. Dynamic concurrency control - reduces parallel load
  # 3. Payload compression and S3 offloading - reduces event size
  # 4. Warning notifications for very large workflows (>200 segments)

  # ═══════════════════════════════════════════════════════════════════════════
  # 🧠 LLM Simulator - Production LLM Integration Testing (MOCK_MODE=false)
  # ═══════════════════════════════════════════════════════════════════════════
  
  # Verify LLM Test Lambda - 테스트 결과 검증
  VerifyLLMTestFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.simulator.verify_llm_test.lambda_handler"]
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          STAGE_NAME: !Ref StageName
          # [Fix] S3 Hydration에 필요한 버킷 이름
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - CloudWatchPutMetricPolicy: {}
        # [Fix] S3 offload된 상태를 읽기 위한 권한 추가 - Stage 4-8 검증 실패 원인
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]

  # LLM Simulator Trigger Lambda - Step Functions 실행 트리거
  LLMSimulatorTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.simulator.llm_simulator.lambda_handler"]
      Timeout: 900  # 15분 - 전체 테스트 스위트 실행
      MemorySize: 512
      Environment:
        Variables:
          STAGE_NAME: !Ref StageName
          MOCK_MODE: "false"  # 🚨 실제 LLM 호출!
          WORKFLOW_ORCHESTRATOR_ARN: !Ref StepFunctionOrchestrator
          WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !Ref StepFunctionDistributedOrchestrator
          LLM_SIMULATOR_STATE_MACHINE_ARN: !Ref LLMSimulatorStateMachine
          METRIC_NAMESPACE: "Analemma/LLMSimulator"
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt LLMSimulatorStateMachine.Name
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionOrchestrator.Name
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionDistributedOrchestrator.Name
        - CloudWatchPutMetricPolicy: {}
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action:
              - states:DescribeExecution
              - states:GetExecutionHistory
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:*"

  # LLMSimulator Trigger Function
  LLMSimulatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "LLMSimulator-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.simulator.llm_simulator.lambda_handler"]
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          LLM_SIMULATOR_STATE_MACHINE_ARN: !Ref LLMSimulatorStateMachine
          WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !GetAtt StepFunctionDistributedOrchestrator.Arn
          WORKFLOW_ORCHESTRATOR_ARN: !GetAtt StepFunctionOrchestrator.Arn
          METRIC_NAMESPACE: Analemma/LLMSimulator
          LOG_LEVEL: INFO
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt LLMSimulatorStateMachine.Name
        - CloudWatchLogsFullAccess

  # LLM Simulator Support Functions
  PrepareLLMTestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "PrepareLLMTest-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.simulator.prepare_llm_test.lambda_handler"]
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !GetAtt StepFunctionDistributedOrchestrator.Arn
          WORKFLOW_ORCHESTRATOR_ARN: !GetAtt StepFunctionOrchestrator.Arn
      Policies:
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - CloudWatchLogsFullAccess

  AggregateLLMResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "AggregateLLMResults-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.simulator.aggregate_llm_results.lambda_handler"]
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          METRIC_NAMESPACE: Analemma/LLMSimulator
      Policies:
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - CloudWatchPutMetricPolicy: {}
        - CloudWatchLogsFullAccess

  # LLM Simulator Step Functions State Machine
  LLMSimulatorStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "LLMSimulator-${StageName}"
      DefinitionUri: src/aws_llm_simulator.json
      DefinitionSubstitutions:
        PrepareLLMTestFunction: !GetAtt PrepareLLMTestFunction.Arn
        VerifyLLMTestFunction: !GetAtt VerifyLLMTestFunction.Arn
        AggregateLLMResultsFunction: !GetAtt AggregateLLMResultsFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref PrepareLLMTestFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref VerifyLLMTestFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AggregateLLMResultsFunction
        - Statement:
          - Effect: Allow
            Action:
              - states:StartExecution
            Resource:
              - !GetAtt StepFunctionDistributedOrchestrator.Arn
              - !GetAtt StepFunctionOrchestrator.Arn
        - Statement:
          - Effect: Allow
            Action:
              - states:DescribeExecution
              - states:StopExecution
            Resource:
              - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:*"
        - Statement:
          - Effect: Allow
            Action:
              - events:PutTargets
              - events:PutRule
              - events:DescribeRule
            Resource:
              - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/StepFunctionsGetEventsForStepFunctionsExecutionRule"

  WorkflowsTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Workflows-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: workflowId
          AttributeType: S
        - AttributeName: name
          AttributeType: S
        - AttributeName: is_scheduled
          AttributeType: S
        - AttributeName: next_run_time
          AttributeType: N
      KeySchema:
        - AttributeName: ownerId
          KeyType: HASH
        - AttributeName: workflowId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: OwnerIdNameIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ScheduledWorkflowsIndex
          KeySchema:
            - AttributeName: is_scheduled
              KeyType: HASH
            - AttributeName: next_run_time
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  UsersTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Users-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  IdempotencyTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Idempotency-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  WebsocketConnectionsTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "WebsocketConnections-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OwnerIdConnectionIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: connectionId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  PendingNotificationsTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "PendingNotifications-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: notificationId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: execution_id
          AttributeType: S
      KeySchema:
        - AttributeName: ownerId
          KeyType: HASH
        - AttributeName: notificationId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: OwnerIdStatusIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ExecutionIdIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: execution_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  TaskTokensTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "TaskTokens-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversation_id
          AttributeType: S
        - AttributeName: execution_id
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
      KeySchema:
        - AttributeName: ownerId
          KeyType: HASH
        - AttributeName: conversation_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ExecutionIdIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: execution_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ExecutionsTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Executions-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: executionArn
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: startDate
          AttributeType: S
        - AttributeName: notificationTime
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: ownerId
          KeyType: HASH
        - AttributeName: executionArn
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: OwnerIdStartDateIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: startDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: NotificationsIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: notificationTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: OwnerIdStatusIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL 설정: 90일 후 자동 삭제
      TimeToLiveSpecification:
        AttributeName: expiration_timestamp
        Enabled: true

  UserUsageTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "UserUsage-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: period
          AttributeType: S
      KeySchema:
        - AttributeName: ownerId
          KeyType: HASH
        - AttributeName: period
          KeyType: RANGE
      # TTL 설정: 1년 후 자동 삭제 (사용량 데이터 장기 보관)
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  BedrockJobTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "BedrockJobs-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: ownerId
          KeyType: HASH
        - AttributeName: job_id
          KeyType: RANGE

  # --- Checkpoints Table for Time Machine functionality ---
  CheckpointsTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Checkpoints-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: thread_id
          AttributeType: S
        - AttributeName: checkpoint_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: thread_id
          KeyType: HASH
        - AttributeName: checkpoint_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: TimeIndex
          KeySchema:
            - AttributeName: thread_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- Skills Table for modular, reusable skill units ---
  SkillsTableV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Skills-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: skillId
          AttributeType: S
        - AttributeName: version
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: visibility
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: skillId
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: OwnerIdIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: skillId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: skillId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI for marketplace: list public skills sorted by updated_at
        - IndexName: VisibilityIndex
          KeySchema:
            - AttributeName: visibility
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # --- Correction Logs Table for Intelligent Instruction Distiller ---
  CorrectionLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CorrectionLogs-${StageName}"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1_pk
          AttributeType: S
        - AttributeName: gsi1_sk
          AttributeType: S
        - AttributeName: gsi2_pk
          AttributeType: S
        - AttributeName: gsi2_sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # 태스크별 조회 최적화
        - IndexName: task-category-index-v2
          KeySchema:
            - AttributeName: gsi1_pk  # task#{category}
              KeyType: HASH
            - AttributeName: gsi1_sk  # user#{user_id}#{timestamp}
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        
        # 사용자별 최근 수정 조회
        - IndexName: user-recent-index-v2
          KeySchema:
            - AttributeName: gsi2_pk  # user#{user_id}
              KeyType: HASH
            - AttributeName: gsi2_sk  # timestamp#{task_category}
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- Distilled Instructions Table for Intelligent Instruction Distiller ---
  DistilledInstructionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "DistilledInstructions-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  # ═══════════════════════════════════════════════════════════════════════════
  # --- Confirmation Tokens Table for Plan Briefing Approval ---
  # 워크플로우 실행 전 사용자 승인을 위한 일회성 토큰 저장
  # ═══════════════════════════════════════════════════════════════════════════
  ConfirmationTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ConfirmationTokens-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: workflow_id
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      GlobalSecondaryIndexes:
        # 사용자별 토큰 조회 (관리/정리용)
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: workflow_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ═══════════════════════════════════════════════════════════════════════════
  # --- Task Events Table for State Drift Prevention ---
  # 중요 이벤트 영속화를 통해 WebSocket 연결 끊김 시에도 상태 복구 가능
  # ═══════════════════════════════════════════════════════════════════════════
  TaskEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "TaskEvents-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: owner_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # 소유자별 최근 이벤트 조회
        - IndexName: OwnerIdTimestampIndex
          KeySchema:
            - AttributeName: owner_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- NodeStats Table for ETA Calculation ---
  # 노드별 실행 시간 통계를 저장하여 정확한 ETA 계산에 활용
  NodeStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "NodeStats-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: node_type
          AttributeType: S
      KeySchema:
        - AttributeName: node_type
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ═══════════════════════════════════════════════════════════════════════════
  # --- Workflow Branches Table for Time Machine ---
  # 롤백 분기(Branch) 기록을 저장하여 Workflow Lineage 시각화 지원
  # ═══════════════════════════════════════════════════════════════════════════
  WorkflowBranchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "workflow-branches-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: branch_id
          AttributeType: S
        - AttributeName: root_thread_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: branch_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Time Machine에서 Workflow Lineage 조회 시 사용
        # 동일 루트 스레드의 모든 분기를 효율적으로 조회
        - IndexName: root-thread-index
          KeySchema:
            - AttributeName: root_thread_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ═══════════════════════════════════════════════════════════════════════════
  # 🛡️ [Quality Kernel] Distributed State Table
  # ═══════════════════════════════════════════════════════════════════════════
  # ConcurrencyController v2.0의 분산 상태 동기화를 위한 테이블
  # - DynamoDB Atomic Counter로 전역 동시성 추적
  # - 워크플로우별 예산 사용량 동기화
  # - Fast Track 우선순위 처리 상태 관리
  KernelStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "analemma-kernel-state-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Purpose
          Value: QualityKernelDistributedState
        - Key: Component
          Value: ConcurrencyController

  # ═══════════════════════════════════════════════════════════════════════════
  # 🌳 [Phase 1] Merkle DAG Workflow Manifests Table
  # ═══════════════════════════════════════════════════════════════════════════
  # Git-style Content-Addressable Storage:
  # - workflow_config/partition_map 제거 → 67% StateBag 축소
  # - 상태 변경 = 델타만 저장 → 90% → 10% 중복 제거
  # - Merkle Root로 무결성 검증
  # - Pre-computed Hash로 O(1) segment 검증
  WorkflowManifestsV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "WorkflowManifests-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: manifest_id
          AttributeType: S
        - AttributeName: workflow_id
          AttributeType: S
        - AttributeName: version
          AttributeType: N
        - AttributeName: manifest_hash
          AttributeType: S
        - AttributeName: governance_decision  # [v2.1.1] For optimistic rollback query
          AttributeType: S
        - AttributeName: parent_hash  # [v2.1.1] For efficient orphan branch traversal
          AttributeType: S
      KeySchema:
        - AttributeName: manifest_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # workflow_id로 모든 버전 조회 (Merkle 체인 추적)
        - IndexName: WorkflowIndex
          KeySchema:
            - AttributeName: workflow_id
              KeyType: HASH
            - AttributeName: version
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # manifest_hash로 중복 검색 (Content-Addressable)
        - IndexName: HashIndex
          KeySchema:
            - AttributeName: manifest_hash
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY
        # [v2.1.1] governance_decision으로 last safe manifest 조회 (Optimistic Rollback)
        - IndexName: GovernanceDecisionIndex
          KeySchema:
            - AttributeName: workflow_id
              KeyType: HASH
            - AttributeName: governance_decision
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # [v2.1.1] parent_hash로 자식 매니페스트 조회 (Rollback Orphan Traversal)
        # Performance: O(Depth) instead of O(N) full table scan
        - IndexName: ParentHashIndex
          KeySchema:
            - AttributeName: parent_hash
              KeyType: HASH
            - AttributeName: version
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true  # 30일 후 자동 GC (Phase 6)
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES  # GC 이벤트 추적
      Tags:
        - Key: Purpose
          Value: MerkleDAGVersioning
        - Key: Component
          Value: StateManagement
        - Key: Phase
          Value: "1"

  # ═══════════════════════════════════════════════════════════════════════════
  # 🌳 [Phase 1] Workflow Block References Table
  # ═══════════════════════════════════════════════════════════════════════════
  # Purpose: Block-level dependency tracking for Merkle DAG
  # Schema:
  #   - PK: workflow_id (workflow identifier)
  #   - SK: block_id (block identifier)
  # Use Cases:
  #   - Track block dependencies and references
  #   - Support graph traversal and validation
  #   - Enable efficient block-level operations
  WorkflowBlockReferencesV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "WorkflowBlockReferences-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workflow_id
          AttributeType: S
        - AttributeName: block_id
          AttributeType: S
      KeySchema:
        - AttributeName: workflow_id
          KeyType: HASH
        - AttributeName: block_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Purpose
          Value: BlockReferences
        - Key: Component
          Value: StateManagement
        - Key: Phase
          Value: "1"

  # ═══════════════════════════════════════════════════════════════════════════
  # 🛡️ [v2.1] Agent Governance - Audit Log Table
  # ═══════════════════════════════════════════════════════════════════════════
  # Purpose: Governor 노드의 결정 기록 (위반 사항, _kernel 명령, Anomaly Score)
  # Schema:
  #   - PK: workflow_id (워크플로우별 audit trail)
  #   - SK: timestamp (시간순 조회)
  #   - GSI: agent_id (에이전트별 행동 패턴 분석)
  # Use Cases:
  #   - Security Incident Investigation (보안 사고 조사)
  #   - Agent Behavior Analysis (에이전트 행동 패턴 학습)
  #   - Governor Effectiveness Metrics (Governor 효과성 측정)
  GovernanceAuditLogV3:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "GovernanceAuditLog-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workflow_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: agent_id
          AttributeType: S
      KeySchema:
        - AttributeName: workflow_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # agent_id로 특정 에이전트의 모든 거버넌스 결정 조회
        - IndexName: AgentIdIndex
          KeySchema:
            - AttributeName: agent_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true  # 90일 후 자동 삭제 (보안 감사 기록 보존 기간)
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES  # CloudWatch 메트릭 집계용
      Tags:
        - Key: Purpose
          Value: AgentGovernance
        - Key: Component
          Value: SecurityAudit
        - Key: Phase
          Value: "2.1"
        - Key: DataClassification
          Value: Sensitive  # 보안 위반 정보 포함

  # ═══════════════════════════════════════════════════════════════════════════
  # 🛡️ [v3.0] Trust Score Metrics Table
  # ═══════════════════════════════════════════════════════════════════════════
  # Purpose: Trust Score 히스토리 DB 플러시 저장소 (메모리 관리)
  # Schema:
  #   - PK: agent_id (에이전트별 신뢰도 추적)
  #   - SK: manifest_id (워크플로우 실행 단위)
  #   - Attributes: trust_score, timestamp, ttl
  # Use Cases:
  #   - Trust Score 히스토리 압축 (20개 초과 시 10개 플러시)
  #   - 장기 트렌드 분석 (Frontend Dashboard)
  #   - Anomaly Detection 학습 데이터
  GovernanceTrustScoreMetrics:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "GovernanceTrustScoreMetrics-v3-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: manifest_id
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
        - AttributeName: manifest_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true  # 90일 후 자동 삭제
      Tags:
        - Key: Purpose
          Value: TrustScoreHistory
        - Key: Component
          Value: GovernanceV3
        - Key: Phase
          Value: "3.0"

  # --- NodeStats Collector Lambda ---
  # EventBridge에서 Step Functions 상태 변화를 수신하여 노드별 실행 시간 통계 업데이트
  NodeStatsCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "node-stats-collector-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.node_stats_collector.lambda_handler"]
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          NODE_STATS_TABLE: !Ref NodeStatsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NodeStatsTable

  # --- Async Alias Generator Lambda ---
  # 워크플로우 시작 시 LLM을 호출하여 비즈니스 별칭 생성 후 WebSocket 푸시
  AsyncAliasGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "async-alias-generator-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.async_alias_generator.lambda_handler"]
      Timeout: 15
      MemorySize: 512
      Environment:
        Variables:
          TASK_TABLE: !Ref ExecutionsTableV3
          WEBSOCKET_API_ENDPOINT: !Sub "wss://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: "*"
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebsocketApi}/*"

  # --- Task Metrics API Lambda ---
  # Bento Grid UI 전용 메트릭스 API
  TaskMetricsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "task-metrics-api-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.task_metrics_api.lambda_handler"]
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          TASK_TABLE: !Ref ExecutionsTableV3
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExecutionsTableV3
      Events:
        GetTaskMetrics:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /tasks/{id}/metrics
            Auth:
              Authorizer: CognitoAuthorizer

  # --- HITL Instruction Distiller Lambda ---
  # 사용자 수정 승인 시 암묵적 학습 파이프라인 실행
  InstructionDistillerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "instruction-distiller-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.instruction_distiller.lambda_handler"]
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DISTILLED_INSTRUCTIONS_TABLE: !Ref DistilledInstructionsTable
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DistilledInstructionsTable
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: "*"

  # --- Clone Instructions API Lambda ---
  # 기존 에이전트의 학습된 지침을 새 에이전트로 복제
  CloneInstructionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "clone-instructions-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.clone_instructions.lambda_handler"]
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DISTILLED_INSTRUCTIONS_TABLE: !Ref DistilledInstructionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DistilledInstructionsTable
      Events:
        CloneInstructions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /instructions/clone
            Auth:
              Authorizer: CognitoAuthorizer

  # --- EventBridge Rule for HITL Approval (Instruction Distillation) ---
  # HITL 승인 이벤트 감지 후 Instruction Distiller 호출
  HITLApprovalDistillRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-hitl-distill"
      EventBusName: !Ref WorkflowEventBus
      EventPattern:
        source:
          - backend-workflow.hitl
        detail-type:
          - HITLApprovalCompleted
      State: ENABLED
      Targets:
        - Id: InstructionDistillerTarget
          Arn: !GetAtt InstructionDistillerFunction.Arn
          RetryPolicy:
            MaximumRetryAttempts: 2
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # Permission for HITL Approval Rule to invoke Instruction Distiller
  HITLApprovalDistillPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref InstructionDistillerFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HITLApprovalDistillRule.Arn

  # --- Background Distiller Lambda (Phase 2b) ---
  # EventBridge-triggered content distillation for low-entropy segments.
  # Decoupled from KernelMiddlewareInterceptor inline processing.
  BackgroundDistillerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "background-distiller-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.background_distiller.lambda_handler"]
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          WORKFLOW_EVENT_BUS_NAME: !Ref WorkflowEventBus
          DISTILLED_INSTRUCTIONS_TABLE: !Ref DistilledInstructionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DistilledInstructionsTable
        - Statement:
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource: !GetAtt WorkflowEventBus.Arn

  # EventBridge Rule: BackgroundDistillationRequested → BackgroundDistillerFunction
  BackgroundDistillationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-bg-distill"
      EventBusName: !Ref WorkflowEventBus
      EventPattern:
        source:
          - backend-workflow.kernel
        detail-type:
          - BackgroundDistillationRequested
      State: ENABLED
      Targets:
        - Id: BackgroundDistillerTarget
          Arn: !GetAtt BackgroundDistillerFunction.Arn
          RetryPolicy:
            MaximumRetryAttempts: 2
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # Permission for BackgroundDistillation Rule to invoke BackgroundDistiller
  BackgroundDistillationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackgroundDistillerFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BackgroundDistillationRule.Arn

  # --- Outcome Manager API Lambda ---
  # Outcome-First UI 전용 API (결과물 목록, 추론 과정 조회)
  OutcomeManagerApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "outcome-manager-api-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.outcome_manager_api.lambda_handler"]
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExecutionsTableV3
        - S3ReadPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Events:
        GetTaskOutcomes:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /tasks/{id}/outcomes
            Auth:
              Authorizer: CognitoAuthorizer
        GetReasoningPath:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /tasks/{id}/outcomes/{artifactId}/reasoning
            Auth:
              Authorizer: CognitoAuthorizer

  # --- Quick Fix Executor API Lambda ---
  # Quick Fix 동적 액션 실행 (Retry, Redirect, Self-healing 등)
  QuickFixExecutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "quick-fix-executor-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.quick_fix_executor.lambda_handler"]
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          TASK_TOKENS_TABLE: !Ref TaskTokensTableV3
          WORKFLOW_ORCHESTRATOR_ARN: !Ref StepFunctionOrchestrator
          WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !Ref StepFunctionDistributedOrchestrator
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskTokensTableV3
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionOrchestrator.Name
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt StepFunctionDistributedOrchestrator.Name
        - Statement:
          - Effect: Allow
            Action:
              - states:SendTaskSuccess
              - states:SendTaskFailure
            Resource: "*"
      Events:
        ExecuteQuickFix:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /tasks/quick-fix
            Auth:
              Authorizer: CognitoAuthorizer

  # --- EventBridge Rule for NodeStats Collection ---
  # Step Functions 상태 변화 시 NodeStats 업데이트
  NodeStatsCollectionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-node-stats"
      EventPattern:
        source:
          - aws.states
        detail-type:
          - Step Functions Execution Status Change
        detail:
          stateMachineArn:
            - !GetAtt StepFunctionOrchestrator.Arn
            - !GetAtt StepFunctionDistributedOrchestrator.Arn
          status:
            - SUCCEEDED
            - FAILED
            - TIMED_OUT
      State: ENABLED
      Targets:
        - Id: NodeStatsTarget
          Arn: !GetAtt NodeStatsCollectorFunction.Arn
          RetryPolicy:
            MaximumRetryAttempts: 2
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # --- EventBridge Rule for Async Alias Generation ---
  # 워크플로우 시작 시 별칭 생성
  AsyncAliasGenerationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-alias-gen"
      EventPattern:
        source:
          - aws.states
        detail-type:
          - Step Functions Execution Status Change
        detail:
          stateMachineArn:
            - !GetAtt StepFunctionOrchestrator.Arn
            - !GetAtt StepFunctionDistributedOrchestrator.Arn
          status:
            - RUNNING
      State: ENABLED
      Targets:
        - Id: AliasGeneratorTarget
          Arn: !GetAtt AsyncAliasGeneratorFunction.Arn
          RetryPolicy:
            MaximumRetryAttempts: 1
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # --- Lambda Permissions for EventBridge ---
  NodeStatsCollectorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NodeStatsCollectorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt NodeStatsCollectionRule.Arn

  AsyncAliasGeneratorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AsyncAliasGeneratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AsyncAliasGenerationRule.Arn

  # --- Event Bus & Rules ---
  WorkflowEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "backend-workflow-${StageName}-event-bus"

  # --- EventBridge Rule for Execution Indexing ---
  # --- EventBridge Rule for Workflow Status Changes (Consolidated) ---
  WorkflowStatusChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-status-change"
      EventPattern:
        source:
          - aws.states
        detail-type:
          - Step Functions Execution Status Change
        detail:
          stateMachineArn:
            - !GetAtt StepFunctionOrchestrator.Arn
          status:
            - SUCCEEDED
            - FAILED
            - TIMED_OUT
            - ABORTED
      State: ENABLED
      Targets:
        - Id: IndexerTarget
          Arn: !GetAtt IndexerFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn
        - Id: FinalizerTarget
          Arn: !GetAtt FinalizerFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn
        - Id: UsageAggregatorTarget
          Arn: !GetAtt UsageAggregatorFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn
        - Id: NotifyUserTarget
          Arn: !GetAtt NotifyUserFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # --- EventBridge Rule for S3 Cleanup on Failed Executions ---
  WorkflowFailureS3CleanupRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-s3-cleanup"
      EventPattern:
        source:
          - aws.states
        detail-type:
          - Step Functions Execution Status Change
        detail:
          stateMachineArn:
            - !GetAtt StepFunctionOrchestrator.Arn
            - !GetAtt StepFunctionDistributedOrchestrator.Arn
          status:
            - FAILED
            - TIMED_OUT
            - ABORTED
      State: ENABLED
      Targets:
        - Id: S3CleanupTarget
          Arn: !GetAtt S3CleanupFunction.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600  # 1 hour
            MaximumRetryAttempts: 2
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # --- EventBridge Rule Permissions ---
  IndexerFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IndexerFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowStatusChangeRule.Arn

  FinalizerFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FinalizerFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowStatusChangeRule.Arn

  NotifyUserFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref NotifyUserFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowStatusChangeRule.Arn

  UsageAggregatorFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UsageAggregatorFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowStatusChangeRule.Arn

  # --- S3 Cleanup Function EventBridge Permission ---
  S3CleanupFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref S3CleanupFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowFailureS3CleanupRule.Arn

  # --- [NEW] EventBridge Rule for Self-Healing (v3.9 Hybrid Architecture) ---
  # 🩹 자동 에러 분류 및 복구 경로 분기
  # - Deterministic Errors: 자동 복구 (QuickFixExecutor 호출)
  # - Semantic Errors: 수동 대기 (AWAITING_MANUAL_HEALING 상태)
  WorkflowFailureSelfHealingRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-self-healing"
      Description: "Trigger auto-healing for Step Functions failures"
      EventPattern:
        source:
          - aws.states
        detail-type:
          - Step Functions Execution Status Change
        detail:
          stateMachineArn:
            - !GetAtt StepFunctionOrchestrator.Arn
            - !GetAtt StepFunctionDistributedOrchestrator.Arn
          status:
            - FAILED
      State: ENABLED
      Targets:
        - Id: SelfHealingTarget
          Arn: !GetAtt AutoHealingTriggerFunction.Arn
          InputTransformer:
            InputPathsMap:
              executionArn: "$.detail.executionArn"
              status: "$.detail.status"
              error: "$.detail.error"
              cause: "$.detail.cause"
            InputTemplate: |
              {
                "detail": {
                  "executionArn": <executionArn>,
                  "status": <status>,
                  "error_type": <error>,
                  "error_message": <cause>
                }
              }
          RetryPolicy:
            MaximumEventAgeInSeconds: 1800  # 30 minutes
            MaximumRetryAttempts: 1
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # --- [NEW] Self-Healing Trigger Lambda Permission ---
  AutoHealingTriggerFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AutoHealingTriggerFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowFailureSelfHealingRule.Arn

  # --- [NEW] Dead Letter Queue for EventBridge Targets ---
  # Enterprise-grade resilience: failed events are queued for retry/manual processing
  EventBridgeDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "backend-workflow-${StageName}-eventbridge-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      VisibilityTimeout: 300  # 5 minutes

  # --- [NEW] EventBridge DLQ Policy ---
  # Allow EventBridge to send messages to the DLQ when targets fail
  EventBridgeDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [ !Ref EventBridgeDLQ ]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EventBridgeDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*"

  # --- [NEW] EventBridge Rule for Segment Execution Progress (Fire-and-Forget Pattern) ---
  # This rule captures SegmentExecutionProgress events published by Step Functions
  # and routes them to ExecutionProgressNotifier for async WebSocket/DB updates.
  # This replaces synchronous Lambda invocation, saving ~100-200ms per segment.
  SegmentProgressRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-segment-progress"
      EventBusName: !Ref WorkflowEventBus
      EventPattern:
        source:
          - backend-workflow.segment
        detail-type:
          - SegmentExecutionProgress
      State: ENABLED
      Targets:
        - Id: ExecutionProgressNotifierTarget
          Arn: !GetAtt ExecutionProgressNotifierFunction.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600  # 1 hour
            MaximumRetryAttempts: 3
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # Permission for SegmentProgressRule to invoke ExecutionProgressNotifier
  SegmentProgressNotifierInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ExecutionProgressNotifierFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SegmentProgressRule.Arn

  # 🚀 [NEW] EventBridge Rule for Workflow Lifecycle Events (Start/Failure)
  # This rule captures WorkflowExecutionStarted and WorkflowExecutionFailed events
  # published by Step Functions and routes them to ExecutionProgressNotifier.
  WorkflowLifecycleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "backend-workflow-${StageName}-lifecycle"
      EventBusName: !Ref WorkflowEventBus
      EventPattern:
        source:
          - backend-workflow.lifecycle
        detail-type:
          - WorkflowExecutionStarted
          - WorkflowExecutionFailed
      State: ENABLED
      Targets:
        - Id: ExecutionProgressNotifierTarget
          Arn: !GetAtt ExecutionProgressNotifierFunction.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600  # 1 hour
            MaximumRetryAttempts: 3
          DeadLetterConfig:
            Arn: !GetAtt EventBridgeDLQ.Arn

  # Permission for WorkflowLifecycleRule to invoke ExecutionProgressNotifier
  WorkflowLifecycleNotifierInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ExecutionProgressNotifierFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkflowLifecycleRule.Arn

  # ═══════════════════════════════════════════════════════════════════════════
  # 🛡️ [v3.0] Async Rationale Generation Infrastructure
  # ═══════════════════════════════════════════════════════════════════════════
  # Architecture: SNS → SQS → Lambda (Fire-and-Forget Pattern)
  # Purpose: Tier 2 위반 설명 생성 (Bedrock Haiku 기반)
  # Latency Impact: 메인 워크플로우와 분리되어 0ms 추가 지연

  # SNS Topic for governance violations
  GovernanceViolationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "Governance Violation Events"
      TopicName: !Sub "governance-violations-${StageName}"
      Tags:
        - Key: Purpose
          Value: AsyncRationaleGeneration
        - Key: Component
          Value: GovernanceV3

  # SQS Queue for async rationale generation
  GovernanceRationaleQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "governance-rationale-${StageName}"
      MessageRetentionPeriod: 86400  # 24 hours
      VisibilityTimeout: 900  # 15 minutes (Lambda timeout)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt GovernanceRationaleDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Purpose
          Value: AsyncRationaleGeneration
        - Key: Component
          Value: GovernanceV3

  # DLQ for failed rationale generation
  GovernanceRationaleDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "governance-rationale-dlq-${StageName}"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Purpose
          Value: AsyncRationaleGenerationDLQ
        - Key: Component
          Value: GovernanceV3

  # SNS subscription to SQS
  GovernanceQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref GovernanceViolationTopic
      Endpoint: !GetAtt GovernanceRationaleQueue.Arn

  # SQS Queue Policy (allow SNS to send messages)
  GovernanceRationaleQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref GovernanceRationaleQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt GovernanceRationaleQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref GovernanceViolationTopic

  # [REMOVED] RationaleGeneratorFunction — handler file
  # src.handlers.governance.rationale_generator_lambda does not exist.
  # Re-add when governance rationale generation is implemented.

  # --- Optional S3 bucket for workflow state (created when WorkflowStateBucket param is empty) ---
  # 🔧 수명 주기 정책 최적화: Outcome Manager 접근성 고려
  WorkflowStateBucketResource:
    Type: AWS::S3::Bucket
    Condition: CreateWorkflowStateBucket
    Properties:
      LifecycleConfiguration:
        Rules:
          # 결과물 메타데이터는 DynamoDB에 보관, S3 본문은 90일 후 전환
          - Id: IntelligentTieringTransition
            Status: Enabled
            Transitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 30
          # Glacier 전환 기간 연장 (30일 → 90일)
          - Id: GlacierTransition
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90
          # Deep Archive는 1년 후
          - Id: DeepArchiveTransition
            Status: Enabled
            Transitions:
              - StorageClass: DEEP_ARCHIVE
                TransitionInDays: 365
          # 임시 파일 정리 (temp/ 프리픽스)
          - Id: TempFilesCleanup
            Status: Enabled
            Prefix: temp/
            ExpirationInDays: 7
          # [E2E] MQTT payload cleanup (1 day TTL) [Feedback ④]
          - Id: MqttPayloadCleanup
            Status: Enabled
            Prefix: mqtt-payloads/
            ExpirationInDays: 1
      Tags:
        - Key: Stage
          Value: !Ref StageName
        - Key: Purpose
          Value: WorkflowStateStorage
        - Key: AutoCleanup
          Value: Enabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  AsyncWorkerTaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateAsyncWorkerRole
    Properties:
      RoleName: !Sub "backend-async-worker-task-execution-${StageName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # --- [추가] WebSocket Lambda Permissions (SAM이 자동으로 안 만들어줘서 수동 추가 필수) ---
  WebsocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebsocketConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/$connect"
        - AccountId: !Ref "AWS::AccountId"

  WebsocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebsocketDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AccountId}:${WebsocketApi}/*/$disconnect"
        - AccountId: !Ref "AWS::AccountId"

  # --- [추가] Kinesis Data Stream for Executions Archive ---
  ExecutionsDataStream:
    Type: AWS::Kinesis::Stream
    Condition: ShouldCreateKinesisStream  # <--- 이 줄이 핵심! ARN 있으면 생성 안 함
    Properties:
      Name: !Sub "executions-stream-auto-${StageName}"
      StreamModeDetails:
        StreamMode: ON_DEMAND

  # --- Executions Archive Infrastructure (TTL + Stream + Firehose) ---
  ExecutionsArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - "analemma-executions-archive-${StageName}-${AccountId}"
        - AccountId: !Ref "AWS::AccountId"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransition
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
          - Id: DeepArchiveTransition
            Status: Enabled
            Transitions:
              - StorageClass: DEEP_ARCHIVE
                TransitionInDays: 365

  ExecutionsArchiveFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub "executions-archive-firehose-${StageName}"
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        # ⚠️ SECURITY NOTE: When using ExternalExecutionsStreamArn, ensure the external Kinesis stream
        # is in the same AWS account and region as this CloudFormation stack. Cross-region streams
        # may cause Firehose delivery failures and additional data transfer costs.
        KinesisStreamARN: !If 
          - ShouldCreateKinesisStream
          - !GetAtt ExecutionsDataStream.Arn
          - !Ref ExternalExecutionsStreamArn
        RoleARN: !GetAtt ExecutionsArchiveFirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt ExecutionsArchiveBucket.Arn
        RoleARN: !GetAtt ExecutionsArchiveFirehoseRole.Arn
        BufferingHints:
          SizeInMBs: 64
          IntervalInSeconds: 300
        CompressionFormat: GZIP
        Prefix: executions/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/
        ErrorOutputPrefix: errors/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/!{firehose:error-output-type}/

  ExecutionsArchiveFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "executions-archive-firehose-role-${StageName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ExecutionsArchiveFirehosePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ExecutionsArchiveBucket.Arn
                  - !Sub "${ExecutionsArchiveBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:ListStreams
                Resource: !If 
                  - ShouldCreateKinesisStream
                  - !GetAtt ExecutionsDataStream.Arn
                  - !Ref ExternalExecutionsStreamArn

  # --- S3 정리 서비스 함수 (실패한 워크플로우 S3 파일 정리) ---
  S3CleanupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "s3-cleanup-service-${StageName}-v2"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.s3_cleanup_service.lambda_handler"]
      Timeout: 300  # 5분 - S3 파일 정리 시간
      MemorySize: 512
      Environment:
        Variables:
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          SKELETON_S3_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:DeleteObject
              - s3:PutBucketLifecycleConfiguration
              - s3:GetBucketLifecycleConfiguration
            Resource: 
              - !If 
                - CreateWorkflowStateBucket
                - !GetAtt WorkflowStateBucketResource.Arn
                - !Sub "arn:aws:s3:::${WorkflowStateBucket}"
              - !If 
                - CreateWorkflowStateBucket
                - !Sub "${WorkflowStateBucketResource.Arn}/*"
                - !Sub "arn:aws:s3:::${WorkflowStateBucket}/*"

  # TTL 마이그레이션 함수 (일회성, 배포 후 제거 가능)
  TTLMigrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ttl-migration-v2-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.ttl_migration.lambda_handler"]
      Timeout: 900  # 15분 타임아웃 (대용량 마이그레이션용)
      MemorySize: 1024
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          RETENTION_DAYS: "90"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3

  # ========================================
  # 🔍 Infrastructure Monitoring Resources
  # ========================================

  # --- InfraSmokeTester: 5분마다 인프라 + 로직 헬스체크 ---
  InfraSmokeTesterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "infra-smoke-tester-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.utils.infra_smoke_tester.lambda_handler"]
      Timeout: 120  # [FIX] Increased for S3 offloading tests
      MemorySize: 512  # [FIX] Increased for 300KB test data processing
      Description: "Environment Validation Engine - S3, DynamoDB, Bedrock, Step Functions, PII Masking, S3 Offloading 상태 검증"
      Environment:
        Variables:
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3  # [NEW] For StatePersistenceService
          WORKFLOW_ORCHESTRATOR_ARN: !Ref StepFunctionOrchestrator
          WORKFLOW_DISTRIBUTED_ORCHESTRATOR_ARN: !Ref StepFunctionDistributedOrchestrator
      Policies:
        # S3 권한 (테스트 데이터 읽기/쓰기/삭제)
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        # [Fix] DynamoDB DescribeTable 권한 추가 (Guardrail 검증용)
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3
  # 4b. Cleanup Service (Explicit Data Debt Removal)
  CleanupServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "cleanup-service-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.simulator.cleanup_service.lambda_handler"]
      Environment:
        Variables:
          EXECUTIONS_TABLE: !Ref ExecutionsTableV3
          WORKFLOWS_TABLE: !Ref WorkflowsTableV3
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTableV3
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkflowsTableV3

  # --- SNS Topic for Critical Alerts ---
  MonitoringSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "Analemma Infrastructure Alerts"

  # --- CloudWatch Dashboard: Single Pane of Glass ---
  AnalemmaDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "Analemma-${StageName}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 6, "height": 6,
              "properties": {
                "title": "🚦 Infra Health Status",
                "annotations": {
                  "horizontal": [
                    {"color": "#d62728", "value": 0.5, "label": "Warning"},
                    {"color": "#2ca02c", "value": 1, "label": "Healthy"}
                  ]
                },
                "metrics": [
                  ["Analemma/Engine", "InfraHealthStatus", {"stat": "Minimum", "period": 300}]
                ],
                "view": "gauge",
                "yAxis": {"left": {"min": 0, "max": 1}},
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 6, "y": 0, "width": 6, "height": 6,
              "properties": {
                "title": "✅ Workflow Success Rate",
                "metrics": [
                  ["AWS/States", "ExecutionsSucceeded", "StateMachineArn", "${StepFunctionOrchestrator}", {"stat": "Sum", "period": 3600, "id": "success"}],
                  [".", "ExecutionsFailed", ".", ".", {"stat": "Sum", "period": 3600, "id": "failed"}]
                ],
                "view": "pie",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 6, "height": 6,
              "properties": {
                "title": "🚨 DLQ Message Count",
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "backend-workflow-${StageName}-eventbridge-dlq", {"stat": "Maximum", "period": 300}]
                ],
                "view": "singleValue",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 18, "y": 0, "width": 6, "height": 6,
              "properties": {
                "title": "🔄 Self-Healing Count",
                "metrics": [
                  ["Analemma/Engine", "SelfHealingCount", {"stat": "Sum", "period": 300}]
                ],
                "view": "singleValue",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "📊 Self-Healing vs Errors",
                "metrics": [
                  ["Analemma/Engine", "SelfHealingCount", {"stat": "Sum", "period": 300, "label": "Self Healed", "color": "#2ca02c"}],
                  ["AWS/States", "ExecutionsFailed", "StateMachineArn", "${StepFunctionOrchestrator}", {"stat": "Sum", "period": 300, "label": "Errors", "color": "#d62728"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "yAxis": {"left": {"min": 0}}
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "💰 Token Usage by Model",
                "metrics": [
                  ["Analemma/Engine", "TotalTokenUsage", "Model", "claude-3-haiku", {"stat": "Sum", "period": 3600}],
                  [".", ".", ".", "claude-3-sonnet", {"stat": "Sum", "period": 3600}],
                  [".", ".", ".", "gpt-4", {"stat": "Sum", "period": 3600}]
                ],
                "view": "timeSeries",
                "stacked": true,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 8, "height": 6,
              "properties": {
                "title": "📦 DynamoDB Capacity",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "Executions-v3-${StageName}", {"stat": "Sum", "period": 60}],
                  [".", "ConsumedReadCapacityUnits", ".", ".", {"stat": "Sum", "period": 60}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 12, "width": 8, "height": 6,
              "properties": {
                "title": "⚡ Lambda Concurrency",
                "metrics": [
                  ["AWS/Lambda", "ConcurrentExecutions", "FunctionName", "segment-runner-${StageName}", {"stat": "Maximum", "period": 60}],
                  [".", ".", ".", "process-segment-chunk-${StageName}", {"stat": "Maximum", "period": 60}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 12, "width": 8, "height": 6,
              "properties": {
                "title": "⏱️ LLM Response Latency (P90 & P99)",
                "metrics": [
                  ["Analemma/Engine", "LLMResponseLatency", {"stat": "p90", "period": 300, "label": "P90", "color": "#1f77b4"}],
                  [".", ".", {"stat": "p99", "period": 300, "label": "P99 (상위 1%)", "color": "#ff7f0e"}],
                  [".", ".", {"stat": "Average", "period": 300, "label": "Average", "color": "#2ca02c"}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "annotations": {
                  "horizontal": [{"color": "#d62728", "value": 15000, "label": "⚠️ Warning (15s)"}]
                },
                "yAxis": {"left": {"label": "ms", "min": 0}}
              }
            }
          ]
        }


  # --- WorkflowSubgraphMetadata Table ---
  # 서브그래프 레이지 로딩을 위한 메타데이터 테이블
  # Content-Addressable Storage: 해시 포인터로 서브그래프 참조
  WorkflowSubgraphMetadata:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-WorkflowSubgraphMetadata"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: subgraph_ref
          AttributeType: S
      KeySchema:
        - AttributeName: subgraph_ref
          KeyType: HASH
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-WorkflowSubgraphMetadata"
        - Key: Purpose
          Value: "Content-Addressable Subgraph Storage Metadata"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- Critical Alarm: Infra Health Failed ---
  CriticalInfraAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Analemma-${StageName}-CriticalInfraFailure"
      AlarmDescription: "인프라 헬스체크 실패 - 즉시 점검 필요"
      Namespace: "Analemma/Engine"
      MetricName: "InfraHealthStatus"
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0.5
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref MonitoringSNSTopic
      OKActions:
        - !Ref MonitoringSNSTopic

  # --- Critical Alarm: DLQ Messages ---
  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Analemma-${StageName}-DLQMessages"
      AlarmDescription: "DLQ에 처리되지 않은 메시지 존재 - 즉시 개입 필요"
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: QueueName
          Value: !Sub "backend-workflow-${StageName}-eventbridge-dlq"
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref MonitoringSNSTopic

  # --- Warning Alarm: Self-Healing Spike ---
  SelfHealingSpikeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Analemma-${StageName}-SelfHealingSpike"
      AlarmDescription: !Sub "자가 치유 급증 (5분 내 10회 초과) - 프롬프트 엔지니어링 점검 필요. CloudWatch Logs에서 'SelfHealingService' 키워드로 검색하여 실패 노드 ID 확인. 대시보드: https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=Analemma-${StageName}"
      Namespace: "Analemma/Engine"
      MetricName: "SelfHealingCount"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref MonitoringSNSTopic

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 10: SQS DLQ-based Garbage Collector
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  # SQS DLQ for orphan block cleanup
  GCDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "analemma-gc-dlq-${StageName}"
      VisibilityTimeout: 300  # 5분
      MessageRetentionPeriod: 1209600  # 14일
      ReceiveMessageWaitTimeSeconds: 20  # Long Polling
      Tags:
        - Key: Service
          Value: SmartStateBag
        - Key: Component
          Value: GarbageCollector
  
  # Background GC Lambda
  BackgroundGCFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "analemma-background-gc-${StageName}"
      PackageType: Image
      ImageUri: !Ref BackendLambdaImageUri
      ImageConfig:
        Command: ["src.handlers.core.background_gc.lambda_handler"]
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          WORKFLOW_STATE_BUCKET: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
      Policies:
        - S3CrudPolicy:
            BucketName: !If [CreateWorkflowStateBucket, !Ref WorkflowStateBucketResource, !Ref WorkflowStateBucket]
        - CloudWatchPutMetricPolicy: {}
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt GCDeadLetterQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
      Tags:
        Service: SmartStateBag
        Component: GarbageCollector
  
  # GC Metrics Alarm
  GCFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Analemma-${StageName}-GCFailures"
      AlarmDescription: "Garbage Collector 실패 급증 - 데이터 정합성 위험"
      Namespace: "AnalemmaOS/GC"
      MetricName: "GCFailures"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref MonitoringSNSTopic

Outputs:
  ApiEndpoint:
    Description: HTTPS endpoint for the HttpApi.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
  WebsocketApiUrl:
    Description: WebSocket URL
    Value: !Sub "wss://${WebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
  LfuEndpointUrl:
    Description: Lambda Function URL for the design assistant
    Value: !GetAtt DesignAssistantFunctionUrlResource.FunctionUrl
  TaskMetricsApiEndpoint:
    Description: Task Metrics API endpoint for Bento Grid UI
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/tasks/{taskId}/metrics"
  NodeStatsTableName:
    Description: NodeStats DynamoDB table for ETA calculation
    Value: !Ref NodeStatsTable
  ConfirmationTokensTableName:
    Description: Confirmation Tokens DynamoDB table for Plan Briefing approval
    Value: !Ref ConfirmationTokensTable
  TaskEventsTableName:
    Description: Task Events DynamoDB table for WebSocket state recovery
    Value: !Ref TaskEventsTable
  WorkflowBranchesTableName:
    Description: Workflow Branches DynamoDB table for Time Machine rollback history
    Value: !Ref WorkflowBranchesTable
  MediaUploadApiEndpoint:
    Description: Media Upload API endpoint for frontend image/video uploads
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api/media/upload"
  MediaPresignApiEndpoint:
    Description: Media Presign API endpoint for large file uploads
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api/media/presign"
